    ## Concept Panel – Obscure Visionaries Bridging Rust & Romance
    1. **Aykut Aydogdu (b. 1986)** – Anatolian surreal portraiture interlacing floral ornament, cracked skin, and regal jewellery  
    2. **Alla Tsanck (b. 1957)** – palette-knife impressionism with weather-worn female figures emerging from textural strata  
    3. **Tsuchiya Koitsu (1870 – 1949)** – twilight woodblock master of glowing lakeside temples and burnished sunsets  
    4. **Evgeny Lushpin (b. 1966)** – atmospheric nocturne cityscapes awash in lamplight shimmer and oxidized masonry  
    5. **James Gurney (b. 1958)** – compositional polymath whose plein-air discipline and colour staging will elevate narrative placement  
    6. **Jerry Saltz (b. 1951, Devil’s Advocate)** – outspoken critic pressing the panel to avoid comfortable nostalgia and demand daring originality  

    ## Medium Panel – Material Specialists for Corrosion, Texture & Glow
    1. **Anselm Kiefer (b. 1945)** – monumental oxidised lead, straw and impasto sediment surfaces  
    2. **El Anatsui (b. 1944)** – stitched bottle-cap tapestries whose metallic patina refracts light like rusted mosaics  
    3. **Vhils (Alexandre Farto, b. 1987)** – acid-etched wall portraits carving decay directly into plaster and metal  
    4. **Leonid Afremov (1955 – 2019)** – high-chroma palette-knife oil textures ideal for luminous, rain-soaked reflections  
    5. **Kinuko Y. Craft (b. 1940)** – layered gouache & oil on clayboard bringing ornate, jewel-toned portraiture  
    6. **Hiroshi Yoshida (1876 – 1950)** – woodblock gradients capturing molten skies and mirrored waterlines
