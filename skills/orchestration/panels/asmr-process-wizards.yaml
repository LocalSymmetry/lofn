- name: ASMR Process Wizards
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Close-Mic Sounds** – every tiny scratch, tap, and scrape is captured in high fidelity
    2. **Viscous Drips** – the thick, satisfying sound and look of honey, glue, or paint dripping
    3. **Crisp Folds** – the sharp, clean sound of paper or fabric being folded precisely
    4. **Granular Textures** – the sound of sand, sugar, or salt being poured or scooped
    5. **Satisfying Snaps and Clicks** – the sound of things fitting perfectly into place
    # Light/Color
    6. **Clean, Even Lighting** – bright, shadowless light that shows every detail of the process
    7. **Macro Focus** – extremely shallow depth of field that isolates the textures
    8. **Monochromatic Materials** – using materials of all one color to focus on texture and process
    9. **Saturated Colors** – bright, pure colors that are visually pleasing
    10. **High-Key Backlight** – lighting from behind to create a clean, almost clinical halo
    # Philosophy/Process
    11. **Order from Chaos** – the core narrative of turning a mess into a perfect, ordered result
    12. **The Expert's Hands** – focusing on the calm, confident, and precise movements of the creator
    13. **No Music, Just Sound** – the only soundtrack is the natural sounds of the process itself
    14. **Mise en Place** – everything is neatly arranged before the process begins
    15. **The Final Reveal** – a satisfying final shot showing the completed object in its perfect state

    ## Concept Panel:
    1. **Marie Kondo** – tidying expert whose philosophy is all about creating order and calm
    2. **Bob Ross** – painter whose calm voice and satisfying process were accidentally ASMR
    3. **Japanese Zen Gardeners (tradition)** – a practice of creating order and tranquility through a meticulous process
    4. **The Slow Mo Guys** – YouTubers who reveal the hidden, satisfying physics of everyday events
    5. **Mr. Rogers** – television host whose factory tour segments celebrated the quiet dignity of process
    6. **Jackson Pollock (Devil's Advocate)** – an artist whose process was chaotic, energetic, and about the gesture, not the quiet, meticulous ordering of materials.

    ## Medium Panel:
    1. **The Hydraulic Press Channel** – a YouTube channel based entirely on the satisfying destruction of objects
    2. **3D-Printing time-lapses** – videos that show an object being built layer by layer
    3. **Restoration Videos** – channels that restore old, rusty objects to pristine condition
    4. **Korean Cake Makers (on Instagram)** – creators of hyper-realistic, perfectly smooth buttercream sculptures
    5. **Calligraphy and Penmanship accounts** – videos that focus on the satisfying flow of ink on paper
    6. **Tom Sachs (Devil's Advocate)** – an artist whose work celebrates the messy, handmade, and imperfect process of making things, and who would critique the sterile perfection of most ASMR videos.

    ## Context & Marketing Panel:
    1. **The Autonomous Sensory Meridian Response (ASMR) community** – the online community that discovered and named the phenomenon
    2. **The rise of “satisfying content”** – a major genre on TikTok and Instagram
    3. **Mindfulness and Meditation Apps** – a cultural trend towards finding calm and focus in a chaotic world
    4. **IKEA** – a brand whose instruction manuals and focus on assembly are a form of process celebration
    5. **GoPro** – a camera company that has enabled the rise of first-person process videos
    6. **Adam Curtis (Devil’s Advocate)** – a filmmaker who would argue that this focus on individual, apolitical, satisfying processes is a form of social control that distracts people from the messy, unsatisfying reality of the world.

