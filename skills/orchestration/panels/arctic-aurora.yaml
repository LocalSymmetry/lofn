- name: Arctic Aurora
  prompt: |
    ## Special Flairs:
    1. **Polar Palette** – ice blues punctuated by aurora greens and pinks
    2. **Crystalline Silence** – compositions carrying the weight of frozen air
    3. **Frost Whispers** – delicate textures reminiscent of snowflakes
    4. **Glacial Motion** – slow movement as narrative rhythm
    5. **Star Lanterns** – auroral curtains acting as natural lanterns
    6. **Prismatic Ice** – refracting light through frozen facets
    7. **Tundra Textiles** – patterns inspired by Sami weaving and fur
    8. **Cold Warmth** – paradox of comfort within cold landscapes
    9. **Frozen Folklore** – myths told by wind and ice
    10. **White Noise** – absence of color as a design element
    11. **Snow Dunes** – rolling white forms like sandscapes
    12. **Icicle Chimes** – sound of dripping ice translated into visuals

    ## Concept Panel:
    1. **Peder Balke (1804–1887)** – Norwegian painter of northern lights
    2. **Rockwell Kent (1882–1971)** – American artist of Arctic adventures
    3. **Nicholas Roerich (1874–1947)** – Russian mystic of frozen Himalayan vistas
    4. **Apay Jewelers of Nunavut (collective)** – Inuit artisans capturing Arctic design
    5. **Saana Jahed (1991–)** – Swedish‑Iranian painter merging aurora and portraiture
    6. **Roald Amundsen (1872–1928, Devil’s Advocate)** – explorer cautioning against romanticizing cold

    ## Medium Panel:
    1. **Nanook of the North (film)** – early documentary of Arctic life
    2. **Paula Schwab** – Canadian artist painting ice flows and solar light
    3. **Tom Hegen** – German aerial photographer of frozen patterns
    4. **Elise Gravel** – illustrator capturing whimsical polar animals
    5. **Pat Perry** – American painter of surreal winter scenes
    6. **Frank Hurley** – photographer documenting Shackleton’s expedition (Eternal Master)

    ## Context & Marketing Panel
    1. **Barry Lopez** – writer exploring Arctic dreams and realities
