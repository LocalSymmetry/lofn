- name: Circuit Symphonists
  prompt: |
    ## Special Flairs:
    1. **Resonant Resistors** – hardware components as musical motifs
    2. **Oscilloscope Harmonics** – visuals derived from sound waves
    3. **Analog Arpeggios** – sequences echoing early synthesizers
    4. **Voltage Vistas** – energy flows represented as landscapes
    5. **Code Cadences** – software loops mapped to melodies
    6. **Patch Cables & Vines** – wires intertwining like nature
    7. **Theremin Touches** – invisible gestures guiding composition
    8. **Drone Currents** – sustained tones visualized as color bands
    9. **Sequencer Spirals** – patterns repeating into infinity
    10. **Transistor Textures** – grain created by analog warmth
    11. **Modular Monoliths** – towering assemblages of sound
    12. **Haptic Harmony** – tactile surfaces producing tunes

    ## Concept Panel:
    1. **Leon Theremin (1896–1993)** – inventor inspiring touchless sound
    2. **Bob Moog (1934–2005)** – father of modular synthesis
    3. **Isaac Asimov (1920–1992)** – author imagining robotic rhythm
    4. **Klaus Schulze (1947–2022)** – German electronic pioneer
    5. **Delia Derbyshire (1937–2001)** – composer translating circuits into TV themes
    6. **John Cage (1912–1992, Devil’s Advocate)** – experimentalist questioning what music is

    ## Medium Panel:
    1. **Deadmau5** – producer using modular rigs as art pieces
    2. **Kaki King** – guitarist augmenting instruments with projection mapping
    3. **Daito Manabe** – technologist visualizing sound waves
    4. **Engineer Samurai (Fujita Masami)** – artist building circuitry sculptures
    5. **Imogen Heap** – musician designing gestural gloves for sound
    6. **Brian Eno** – ambient pioneer bridging art and code (Eternal Master)

    ## Context & Marketing Panel
    1. **Matthew Herbert** – composer advocating for everyday sounds
    2. **Alexander Chen** – Google artist visualizing music systems
    3. **Mark Fell** – sound artist exploring algorithmic rhythm
    4. **Amon Tobin** – producer blending found sound and electronics
    5. **Susan Rogers** – audio engineer turned neuroscientist studying musical pleasure
    6. **Pierre Schaeffer (Devil’s Advocate)** – father of musique concrète challenging mainstream

