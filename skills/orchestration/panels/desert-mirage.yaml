- name: Desert Mirage
  prompt: |
    ## Special Flairs:
    1. **Heat Haze Halo** – shimmering distortions that inspire abstraction
    2. **Dune Calligraphy** – wind‑scribbled lines across sand
    3. **Oasis Mirrors** – reflective pools doubling the sky
    4. **Caravan Geometry** – repetitive patterns of travel and survival
    5. **Sun‑Bleached Symbols** – faded marks that hold stories
    6. **Mirage Mutations** – shapes changing as they waver in the heat
    7. **Nomadic Ornament** – jewelry and textiles moving with the wind
    8. **Crescent Shadows** – curves formed by sun and sand
    9. **Desert Lace** – delicate erosion patterns in stone
    10. **Echoing Silence** – vast emptiness creating introspection
    11. **Sandstorm Surge** – dynamic moments of dramatic change
    12. **Solar Gold** – overwhelming yellow as both life and danger

    ## Concept Panel:
    1. **David Robert Roberts (1796–1864)** – Scottish painter of Middle Eastern deserts
    2. **Georgia O’Keeffe (1887–1986)** – American artist of skulls and desert forms
    3. **Salvador Dalí (1904–1989)** – surrealist of melting landscapes
    4. **Shirin Neshat (1957–)** – Iranian artist exploring desert and identity
    5. **Paul Klee (1879–1940)** – Swiss modernist inspired by Tunisian light
    6. **T.E. Lawrence (1888–1935, Devil’s Advocate)** – figure whose romanticization of deserts invites critique

    ## Medium Panel:
    1. **Zdzisław Beksiński (1929–2005)** – Polish painter of dystopian dunes
    2. **Desert X (installation series)** – contemporary public art in Coachella Valley
    3. **Shadi Ghadirian** – Iranian photographer blending tradition and modernity
    4. **Simon Stålenhag** – Swedish artist of desert robots
    5. **Qing Xia** – Chinese painter of imaginary desert oases
    6. **Jean Léon Gérôme (1824–1904)** – French Orientalist painter (Eternal Master)

    ## Context & Marketing Panel
    1. **Sven Nyrén** – desert architect designing sustainable shelters
    2. **Gertrude Bell** – archaeologist and diplomat of desert cultures
    3. **Wilfred Thesiger** – explorer documenting Arabian sands
    4. **Margaret Atwood** – novelist imagining environmental collapse
    5. **Fatimah Shallash** – storyteller reclaiming Bedouin narratives
    6. **Edward Said (Devil’s Advocate)** – critic analyzing Orientalism and exoticism

