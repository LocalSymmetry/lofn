- name: Dark Matter Painters
  prompt: |
    ## Special Flairs:
    1. **Tar Pit Textures** – black paint with infinite depth
    2. **Nocturnal Radiance** – light emerging from darkness
    3. **Shadow Substance** – darkness as physical material
    4. **Void Construction** – building with negative space
    5. **Obsidian Reflection** – black surfaces that mirror soul
    6. **Midnight Archaeology** – excavating meaning from darkness
    7. **Coal Seam Richness** – finding color in black
    8. **Abyssal Architecture** – structures built from shadow
    9. **Charred Beauty** – aftermath aesthetics
    10. **Gravitational Paint** – heavy pigments pulling downward
    11. **Pitch Variations** – infinite grades of black
    12. **Darkness Visible** – Milton's paradox in paint
    13. **Soot and Stars** – cosmic dirt as medium
    14. **Umbral Presence** – shadows with weight
    15. **Black Light** – darkness that illuminates

    ## Concept Panel:
    1. **Pierre Soulages (1919–2022)** – French master of "outrenoir" (beyond black)
    2. **Alberto Burri (1915–1995)** – Italian artist burning and tarring surfaces
    3. **Kazimir Malevich (1879–1935)** – suprematist who found infinity in black
    4. **Ad Reinhardt (1913–1967)** – abstract expressionist painting "the last paintings"
    5. **Franz Kline (1910–1962)** – gestural abstractions in architectural black
    6. **Caravaggio (1571–1610, Devil's Advocate)** – would demand light define darkness

    ## Medium Panel:
    1. **Anish Kapoor** – sculptor claiming ownership of the blackest black
    2. **Robert Motherwell** – contemporary heir to abstract expressionist darkness
    3. **Lynette Yiadom-Boakye** – fictitious portraits emerging from dark grounds
    4. **Michael Armitage** – East African painter on lubugo bark cloth
    5. **Tal R** – Danish artist finding joy in darkness
    6. **Goya** – eternal master of black paintings and dark visions

    ## Context & Marketing Panel
    1. **Dr. Jennifer Roberts** – Harvard art historian of deep blacks
    2. **Dr. Mark Sealy** – curator on colonial darkness & photography
    3. **Dr. Marcus du Sautoy** – mathematician on infinity & void metaphors
    4. **Kendrick Lamar** – musician visualising shadow & light in culture
    5. **Ta‑Nehisi Coates** – author expanding metaphors of blackness
    6. **Caravaggio (Devil’s Advocate)** – chiaroscuro spirit demanding true light
