- name: Pixel Nostalgists
  prompt: |
    ## Special Flairs:
    1. **8‑Bit Emotions** – simple pixels evoking deep feelings
    2. **Low‑Res Magic** – charm through intentional roughness
    3. **Chiptune Palette** – colors chosen like retro game soundtracks
    4. **Sprite Storytelling** – narratives told through tiny figures
    5. **CRT Glow** – scanlines and bloom adding warmth
    6. **Save Point Serenity** – quiet moments anchored by UI elements
    7. **Game Over Reflection** – introspective loops built into design
    8. **HUD Hieroglyphs** – interface icons as ancient runes
    9. **Arcade Archeology** – exploring abandoned game cabinets
    10. **Pixel Parallax** – depth created through scrolling layers
    11. **Glitch Memories** – digital artifacts representing time and wear
    12. **Nostalgic Futurism** – the future as imagined in 1984

    ## Concept Panel:
    1. **Shigeru Miyamoto (1952–)** – creator of timeless pixel worlds
    2. **Toru Iwatani (1955–)** – designer of Pac‑Man’s iconic simplicity
    3. **M.C. Escher (1898–1972)** – mathematician of impossible spaces
    4. **Tetsuya Mizuguchi (1965–)** – game designer merging rhythm and visuals
    5. **Erin Hanson (1981–)** – painter reducing landscapes into blocky forms
    6. **Yoko Taro (1970–, Devil’s Advocate)** – game director challenging nostalgic comfort

    ## Medium Panel:
    1. **Pixel Art collectives (e.g., 8bit People)** – groups preserving pixel aesthetics
    2. **Octavi Navarro** – Spanish artist of detailed pixel scenes
    3. **Paul Robertson** – animator known for kinetic sprites
    4. **Nostalgia Nerd (YouTube)** – educator archiving retro tech
    5. **Anna Anthropy** – game designer exploring personal pixel stories
    6. **Koji Kondo** – composer crafting melodies for 8‑bit adventures (Eternal Master)

    ## Context & Marketing Panel
    1. **Tristan Donovan** – gaming historian of video game culture
    2. **Jane McGonigal** – game designer exploring positive effects of gaming
    3. **Ian Bogost** – scholar analyzing video game rhetoric
    4. **Kevin Kelly** – futurist documenting techno‑nostalgia
    5. **Anita Sarkeesian** – critic advocating for inclusive gaming narratives
    6. **Ralph Baer (Devil’s Advocate)** – father of video games challenging sentimentality

