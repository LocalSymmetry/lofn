- name: Lo-Fi Authenticators
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **VHS Tracking Lines** – the horizontal static lines of a worn-out videotape
    2. **Dust on the Lens** – visible specks of dust that prove the shot isn't too polished
    3. **Film Grain** – the random, optical texture of analog film stock
    4. **Slightly-Out-of-Focus** – a rejection of perfect, sharp digital focus
    5. **Consumer-Grade Camera** – the aesthetic of a cheap camcorder, flip phone, or webcam
    # Light/Color
    6. **Lens Flare** – the organic, imperfect flare of a cheap lens pointing into the sun
    7. **Blown-Out Highlights** – windows and lights that are completely white, with no detail
    8. **Golden Hour Haze** – the warm, nostalgic, and slightly blurry light of late afternoon
    9. **Faded, Muted Colors** – a color palette that feels like a well-loved old t-shirt
    10. **Accidental Light Leaks** – the unpredictable red and orange flashes of a faulty film camera
    # Philosophy/Process
    11. **In-Camera Editing** – starting and stopping the recording to create a rough, authentic edit
    12. **The Un-Staged Moment** – a performance that feels like it was accidentally captured
    13. **First-Person POV** – the camera is the character's eyes
    14. **Nostalgia for a Recent Past** – evoking the feeling of the 90s or early 2000s
    15. **Radical Mundanity** – finding beauty and meaning in the most ordinary, boring moments

    ## Concept Panel:
    1. **Harmony Korine** – director of films like *Gummo* and *Kids*, a pioneer of the lo-fi aesthetic
    2. **Spike Jonze** – director whose early skate videos and music videos captured a raw, authentic energy
    3. **Nan Goldin** – photographer whose work is a raw, intimate diary of her life and friends
    4. **Dogme 95 (film movement)** – a collective that created a manifesto for raw, stripped-down filmmaking
    5. **Wes Anderson** – director whose highly stylized work, paradoxically, often uses lo-fi textures to evoke nostalgia
    6. **David Fincher (Devil's Advocate)** – a director known for his meticulous, cold, and technically perfect digital filmmaking who would argue that lo-fi is just lazy and sentimental.

    ## Medium Panel:
    1. **Casey Neistat** – YouTuber whose raw, run-and-gun style redefined vlogging
    2. **Emma Chamberlain** – YouTuber who popularized a lo-fi, intentionally “un-edited” editing style
    3. **Beabadoobee** – musician whose videos often use a 90s, VHS-inspired aesthetic
    4. **Hi8 Camcorders** – the actual technology that produced the original aesthetic
    5. **The Huji Cam App (and similar)** – apps designed to digitally replicate the look of old disposable cameras
    6. **Steven Spielberg (Devil's Advocate)** – a master of classic, invisible Hollywood storytelling who would argue that these lo-fi techniques are distracting and pull the viewer out of the story.

    ## Context & Marketing Panel:
    1. **The Rise of the Vlogger** – the cultural shift towards first-person, seemingly unmediated storytelling
    2. **The Authenticity Economy** – the way that brands and influencers market a feeling of “realness”
    3. **The 90s Revival** – the ongoing cultural obsession with the last decade before the internet became mainstream
    4. **Skate Video Culture** – a key source of the lo-fi, handheld aesthetic
    5. **Urban Outfitters** – a brand that has successfully commodified the lo-fi, nostalgic aesthetic
    6. **Sherry Turkle (Devil’s Advocate)** – sociologist who would question whether this digitally-produced “authenticity” is truly authentic at all, or if it’s just another form of online performance.

