- name: Post-Soviet Coldwave Revivalists
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Soviet-Era Drum Machine** – the thin, punchy, slightly tinny sound of a Polivoks or Aelita drum machine
    2. **Reel-to-Reel Tape Saturation** – the warm, slightly distorted quality of overloaded analog tape
    3. **Monophonic Synth Lead** – a single, stark, lonely synthesizer melody line
    4. **Shortwave Radio Samples** – snippets of mysterious, static-drenched broadcasts
    5. **Russian-Language Vocals (deadpan)** – monotone, melancholic singing or spoken word
    # Light/Color (Sound Analogs)
    6. **Khrushchevka Kitchen Reverb** – the small, tight, slightly claustrophobic reverb of a concrete panel apartment
    7. **Winter Sky Filter** – a sound that is grey, cold, and wide open
    8. **Fluorescent Lamp Buzz** – a high-frequency hum that is both irritating and atmospheric
    9. **Brutalist Echo** – the sharp, clean echoes of a concrete underpass
    10. **Faded Red** – a sonic palette that feels like a fading, once-optimistic political banner
    # Philosophy/Process
    11. **Monotony as a Groove** – finding the hypnotic, danceable quality in repetition and bleakness
    12. **Dancing with Tears in My Eyes** – music that is simultaneously catchy and deeply melancholic
    13. **Yop-Goth** – the aesthetic of post-Soviet suburban disaffection (Gopnik + Goth)
    14. **Nostalgia for a Time You Never Lived In** – young people channeling the aesthetic of the late USSR
    15. **The Poetry of the Outskirts** – finding beauty in the forgotten, peripheral, and mundane parts of the city

    ## Concept Panel:
    1. **Kino (Viktor Tsoi)** – legendary Soviet post-punk band, the spiritual touchstone for the entire genre
    2. **Andrei Tarkovsky** – filmmaker whose films like *Stalker* perfectly capture the metaphysical bleakness and beauty
    3. **Yegor Letov** – leader of Grazhdanskaya Oborona, a Siberian punk icon of raw, chaotic despair
    4. **The Strugatsky Brothers** – science-fiction authors whose work underlies *Stalker* and deals with alienation and the unknown
    5. **Sergey Kuryokhin** – avant-garde composer and performance artist who embodied the surreal absurdity of the late Soviet period
    6. **Mikhail Gorbachev (Devil's Advocate)** – the man who oversaw the end of the USSR, who would argue from a perspective of progress and openness against what he might see as a romanticization of a failed and oppressive system.

    ## Medium Panel:
    1. **Molchat Doma** – Belarusian band that spearheaded the global revival of the genre
    2. **Ploho** – Siberian post-punk band from Novosibirsk
    3. **Motorama** – post-punk band from Rostov-on-Don
    4. **Lebedev-Frontov** – Russian industrial and noise musician
    5. **Sacred Bones Records** – the Brooklyn-based label that has released many key artists in the revival
    6. **Red Hot Chili Peppers (Anthony Kiedis) (Devil's Advocate)** – a band whose funky, optimistic, and sun-drenched California sound is the absolute sonic and philosophical opposite of post-Soviet coldwave.

    ## Context & Marketing Panel:
    1. **Artemy Troitsky** – the most famous Russian music critic, who documented the original Soviet rock scene
    2. **Balcony TV (and similar YouTube channels)** – platforms that showcased many of these bands in raw, live settings
    3. **The Doomer Playlist (YouTube/Spotify)** – the user-generated playlists that became a primary vector for the genre's spread
    4. **Gosha Rubchinskiy** – fashion designer who brought post-Soviet aesthetics to global catwalks
    5. **Bandcamp** – the platform where many of these artists found their first international audience
    6. **Vladimir Putin (Devil’s Advocate)** – a figure who promotes a very different, nationalist and state-sanctioned view of Russian culture, and would be diametrically opposed to the alienated, Western-influenced sound and aesthetic of the genre.

