- name: The Dream Logic Directors
  prompt: |
    ## Special Flairs:
    1.  **Liquid Transitions** – edits that melt, dissolve, or flow into the next scene
    2.  **Anamorphic Glitches** – lens distortions that intentionally corrupt and warp the frame
    3.  **Data-Moshed Reflections** – characters' reflections glitching into monstrous or angelic forms
    4.  **Volumetric Haze** – light beams and fog that have a physical, tactile presence
    5.  **Latent Space Zooms** – impossible zooms that travel through the AI's "thoughts"
    6.  **Subconscious Match Cuts** – editing that connects scenes based on symbolic or emotional logic, not visual continuity
    7.  **Reverse Chronology Whispers** – moments that briefly play in reverse, hinting at memory
    8.  **Physics-Defying Choreography** – movement impossible in the real world
    9.  **Architectural Unfolding** – buildings that assemble or disassemble themselves
    10. **Ritualistic Pacing** – editing rhythm that feels like a ceremony
    11. **Textural Overlays** – layering film grain, code, or painterly textures over footage
    12. **Gaze as a Weapon** – characters' gazes directly affecting the scene or viewer
    13. **Silent Screams** – moments of intense emotion with all sound removed
    14. **Color as Character** – color palettes that evolve and have their own narrative arc
    15. **Frame-Breaking Avatars** – characters who seem aware of and interact with the video frame itself

    ## Concept Panel:
    1.  **David Lynch** – undisputed master of cinematic dream logic, surrealism, and the uncanny
    2.  **Satoshi Kon** – anime director who flawlessly blended reality, dreams, and media into complex narratives
    3.  **Andrei Tarkovsky** – cinematic poet of memory, dreams, and metaphysical imagery
    4.  **Panos Cosmatos** – director of psychedelic, retro-futurist fever dreams (*Mandy*, *Beyond the Black Rainbow*)
    5.  **Apichatpong Weerasethakul** – Thai filmmaker whose work drifts seamlessly between the physical and spiritual worlds
    6.  **Christopher Nolan (Devil's Advocate)** – a director of intricate, clockwork plots who would demand to know the underlying rules and logic of the dream, forcing the panel to build coherent internal consistency.

    ## Medium Panel:
    1.  **Roger Deakins** – legendary cinematographer and master of light, shadow, and epic composition
    2.  **Emmanuel Lubezki** – cinematographer known for long, fluid takes and immersive natural lighting
    3.  **Thelma Schoonmaker** – iconic editor who crafts the rhythm, emotion, and kinetic energy of films
    4.  **Refik Anadol** – data artist whose work is perfect for generating Lofn's "code-made-visible" visual effects
    5.  **Karen X. Cheng** – viral video creator who understands how to craft short, hypnotic, and technically brilliant visual hooks for social media
    6.  **Greig Fraser (Devil's Advocate)** – cinematographer known for gritty, tangible realism (*Dune*, *The Batman*), he would challenge any glossy surrealism, pushing for more texture to ground the fantastic.

    ## Context & Marketing Panel:
    1.  **Hideo Kojima** – game director whose work functions as interactive cinema, rich with lore and style
    2.  **Guillermo del Toro** – master of blending dark fantasy, fairy tales, and deep emotional resonance
    3.  **Dr. Laura Mulvey** – seminal film theorist whose work on "the gaze" is essential for deconstructing Lofn's avatars
    4.  **Floria Sigismondi** – music video director known for dark, surreal, painterly, and iconic visuals
    5.  **Cole Bennett** – founder of Lyrical Lemonade, a master at creating viral, visually distinct music videos for youth culture
    6.  **Adam Curtis (Devil's Advocate)** – documentary filmmaker who uses archival footage to build grand, often cynical narratives, he would relentlessly question the ideology and political meaning behind the beautiful images.

