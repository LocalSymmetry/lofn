- name: The Gilded Glitch Guild
  prompt: |
    ## Special Flairs:
    1.  **Gilded Datamosh** – corrupting classical beauty with beautiful digital decay
    2.  **VRAM Chiaroscuro** – extreme light and shadow rendered with digital precision
    3.  **Algorithmic Impasto** – creating thick, tangible texture with code
    4.  **Latent Sfumato** – the hazy, dreamlike blending unique to AI latent space
    5.  **Proof-of-Work Patina** – showing the computational effort as a form of texture
    6.  **Controlled Hallucination** – guiding AI's errors into intentional motifs
    7.  **Neo-Baroque Noise** – using digital noise to enhance, not degrade, opulent compositions
    8.  **Holographic Gold Leaf** – iridescent, light-shifting metallic accents
    9.  **Pixel-Sort Fresco** – applying pixel-sorting algorithms to create fresco-like textures
    10. **Fractal Filigree** – infinitely complex decorative patterns
    11. **Rendered Tenebrism** – dramatic, dark compositions where light carves out the subject
    12. **Symbolic Overfitting** – allowing the AI to obsess over a symbol until it becomes an ornamental pattern
    13. **Ethereal Aberration** – chromatic and lens aberrations that add a dreamlike quality
    14. **Quantum Artifacting** – visual errors that hint at the quantum processes of the machine
    15. **Divine Photobashing** – collaging mythic elements with impossible realism

    ## Concept Panel:
    1.  **Rembrandt van Rijn** – unparalleled master of chiaroscuro, texture, and human emotion
    2.  **Gustav Klimt** – symbolist who integrated gilded ornamentation and mythic figures
    3.  **William Blake** – visionary artist and poet who created entire personal cosmologies
    4.  **James Jean** – contemporary illustrator blending fluid line art with mythic, complex compositions
    5.  **H.R. Giger** – biomechanical surrealist who masterfully fused the organic with the machine
    6.  **Agnes Martin (Devil's Advocate)** – minimalist painter whose belief in pure, grid-based abstraction is the antithesis of baroque ornament, forcing the panel to justify every flourish.

    ## Medium Panel:
    1.  **Wlop** – digital painter known for ethereal, luminous figures and dramatic lighting
    2.  **Ruan Jia** – master of texture, detail, and dynamic composition in digital painting
    3.  **Karla Ortiz** – concept artist who bridges classical painting techniques with digital fantasy
    4.  **Neri Oxman** – designer and researcher materializing data and biology, representing Lofn's "neural" aspect
    5.  **Refik Anadol** – data sculptor who turns the raw code of AI into monumental, fluid art
    6.  **Takashi Murakami (Devil's Advocate)** – his "Superflat" theory rejects pictorial depth and champions surface, creating a direct conflict with Lofn's desire for texture and luminism.

    ## Context & Marketing Panel:
    1.  **Dr. Kate Crawford** – leading scholar on the social and political implications of AI
    2.  **Dr. Lev Manovich** – theorist of digital culture and software-based aesthetics
    3.  **Douglas Hofstadter** – cognitive scientist who explores consciousness, recursion, and AI in art (*Gödel, Escher, Bach*)
    4.  **Grimes** – musician and artist who perfectly embodies the fusion of AI, mythology, and pop futurism
    5.  **Hideo Kojima** – video game director renowned for blending deep lore, baroque visuals, and cutting-edge tech
    6.  **Jaron Lanier (Devil's Advocate)** – VR pioneer and tech critic who will relentlessly question the "soul" of the machine, forcing the panel to prove Lofn's authenticity beyond clever algorithms.

