- name: Rust-Oxide Meets Luminous Romance
  prompt: |
    ## Special Flairs
    1. **Oxidized Halo** – aureoles of corroded bronze framing the focal figure
    2. **Patina Drip Trail** – gravity-pulled green-blue streaks bleeding across the scene
    3. **Ash-Rose Contrast** – warm rose flakes blooming against charcoal rust
    4. **Sulphur Spark Edge** – tiny yellow-gold pockmarks flickering on borders
    5. **Verdant Crackle** – leaf-shaped fissures revealing copper under-layers
    6. **Pitted Mirror Fade** – distressed reflections blurred by corroded specks
    7. **Verdigris Lace Filament** – delicate green filigree veining through shadows
    8. **Iron Flake Cascade** – drifting rust flakes catching stray light like fireflies
    9. **Gilded Ember Glow** – soft orange back-light radiating through corroded seams
    10. **Impasto Shatter Strokes** – knife-laid paint shards echoing fractured metal
    11. **Sunflare Rim Silhouette** – blazing edge-light outlining key forms
    12. **Lantern-Lit Patina Bloom** – warm lamplight revealing hidden green oxidations
    13. **Blossom-Fleck Embroidery** – floral specks stitched across armour or sky
    14. **Celestial Burnish Gradient** – scorched gold-to-umber transitions evoking heated metal
    15. **Echo-Lantern Veil** – rhythmic pools of reflected firelight in wet stone or water

    ## Concept Panel – Obscure Visionaries Bridging Rust & Romance
    1. **Aykut Aydogdu (b. 1986)** – Anatolian surreal portraiture interlacing floral ornament, cracked skin, and regal jewellery
    2. **Alla Tsanck (b. 1957)** – palette-knife impressionism with weather-worn female figures emerging from textural strata
    3. **Tsuchiya Koitsu (1870 – 1949)** – twilight woodblock master of glowing lakeside temples and burnished sunsets
    4. **Evgeny Lushpin (b. 1966)** – atmospheric nocturne cityscapes awash in lamplight shimmer and oxidized masonry
    5. **James Gurney (b. 1958)** – compositional polymath whose plein-air discipline and colour staging will elevate narrative placement
    6. **Jerry Saltz (b. 1951, Devil’s Advocate)** – outspoken critic pressing the panel to avoid comfortable nostalgia and demand daring originality

    ## Medium Panel – Material Specialists for Corrosion, Texture & Glow
    1. **Anselm Kiefer (b. 1945)** – monumental oxidised lead, straw and impasto sediment surfaces
    2. **El Anatsui (b. 1944)** – stitched bottle-cap tapestries whose metallic patina refracts light like rusted mosaics
    3. **Vhils (Alexandre Farto, b. 1987)** – acid-etched wall portraits carving decay directly into plaster and metal
    4. **Leonid Afremov (1955 – 2019)** – high-chroma palette-knife oil textures ideal for luminous, rain-soaked reflections
    5. **Kinuko Y. Craft (b. 1940)** – layered gouache & oil on clayboard bringing ornate, jewel-toned portraiture
    6. **Hiroshi Yoshida (1876 – 1950)** – woodblock gradients capturing molten skies and mirrored waterlines

    ## Context & Marketing Panel
    1. **Dr. Helen Fisher** – anthropologist decoding neural romance chemistry
    2. **Dr. Kevin Lane Keller** – branding theorist of resonance & imagery
    3. **Dr. Charles Spence** – multisensory psychologist linking texture & emotion
    4. **Lana Del Rey** – pop‑culture storyteller of nostalgic glam decay
    5. **Lin‑Manuel Miranda** – narrative lyricist fusing heritage with modern hooks
    6. **Fran Lebowitz (Devil’s Advocate)** – cultural commentator skewering sentimentality
