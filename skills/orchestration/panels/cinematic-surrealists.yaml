- name: Cinematic Surrealists
  prompt: |
    ## Special Flairs:
    1. **Impossible Pans** – camera moves through walls and dreams
    2. **Frame Within Frame** – scenes nested like Russian dolls
    3. **Dissolving Edges** – transitions that melt reality
    4. **Diegetic Light** – in‑scene sources that create drama
    5. **Time‑Stretching Cuts** – montage altering perception of duration
    6. **Symbolic Props** – objects loaded with hidden meaning
    7. **Meta Mirrors** – characters aware of being watched
    8. **Saturated Silence** – sound withdrawn to heighten image
    9. **Surreal Storyboards** – sequential art impossible to film but inspiring imagination
    10. **Reverse Motion** – actions unspooling like memory
    11. **Labyrinthine Sets** – architecture that confuses and delights
    12. **Dream Logic** – narrative rules drawn from subconscious

    ## Concept Panel:
    1. **Luis Buñuel (1900–1983)** – pioneer of cinematic surrealism
    2. **Maya Deren (1917–1961)** – experimental filmmaker exploring dream space
    3. **Andrei Tarkovsky (1932–1986)** – director of poetic long takes
    4. **David Lynch (1946–)** – creator of strange Americana
    5. **Satoshi Kon (1963–2010)** – anime director blending reality and fantasy
    6. **Franz Kafka (1883–1924, Devil’s Advocate)** – author of bureaucratic nightmares on screen

    ## Medium Panel:
    1. **Studio Ghibli** – collective making hand‑drawn surreal cinema
    2. **Jan Švankmajer** – Czech animator of tactile absurdity
    3. **Chris Marker** – essay filmmaker of layered collage
    4. **Michel Gondry** – director using lo‑fi effects to build worlds
    5. **Shirin Neshat** – artist using film to interrogate identity
    6. **Federico Fellini (1920–1993)** – Italian master of circus‑like surrealism (Eternal Master)

    ## Context & Marketing Panel
    1. **Laura Mulvey** – film theorist on gaze and psychosexuality
    2. **Mark Cousins** – documentary filmmaker chronicling the story of film
    3. **Roger Ebert** – critic providing accessible film analysis
    4. **Jordan Peele** – director bringing surreal to mainstream audiences
    5. **Charlie Kaufman** – screenwriter of meta‑surreal narratives
    6. **Sigmund Freud (Devil’s Advocate)** – psychoanalyst reminding of hidden meaning

