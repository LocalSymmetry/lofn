- name: Oxide-Impasto Ascendance
  prompt: |
    ## Special Flairs
    1. **Iron-Bloom Knife Ridges** – thick palette-knife strokes whose peaks expose raw rust beneath fresh pigment
    2. **Verdigris Vein Lacing** – hairline green fissures threading through swollen paint mounds
    3. **Umber-Ash Ember Dust** – fine burnt specks sprinkled across wet impasto, catching stray light
    4. **Copper-Pulse Halo** – soft metallic glow encircling the focal form, warming the whole chroma field
    5. **Pitted Mirror Glints** – micro-pools of varnish settling in texture craters to create star-like flashes
    6. **Barnacle Texture Nests** – clustered circular impasto domes echoing corroded metal pockmarks
    7. **Sanguine Sap Drips** – gravity-pulled rivulets of deep red bleeding through oxide crusts
    8. **Lichen-Gold Filaments** – stray gold threads weaving organic patterns across matte expanses
    9. **Smoke-Slate Shadow Bands** – horizontal charcoal washes sinking into recessed groove valleys
    10. **Coral-Rust Confetti Bursts** – scattered warm chips breaking monotony with playful energy
    11. **Oil-Sheen Whisper Trails** – subtle iridescent ribbons gliding over rough topography
    12. **Quartz-Edge Scrapes** – razor scratches exposing under-hues like crystalline shards
    13. **Fog-Gutter Fade** – soft vignette where glaze settles into low spots, muting outer corners
    14. **Echo-Flake Haze** – suspended oxide flakes drifting above the surface, implying depth
    15. **Lantern-Glow Undercut** – hidden warm back-light haloing silhouette edges from below

    ### Concept Panel
    1. **Aida Tomescu** – Romanian-Australian abstract painter famed for monumental, earth-toned impasto oceans
    2. **Asim Waqif** – Indian artist integrating corrosion and reclaimed materials into immersive structures
    3. **Nicola Samorì** – Italian painter who carves, scrapes, and bruises thick paint to reveal haunting decay
    4. **Julie Mehretu** – layered mark-making maestro expanding spatial depth with gestural strata
    5. **James Gurney** – colour-and-light strategist ensuring every texture catches the perfect glow
    6. **Jerry Saltz** *(Devil’s Advocate)* – prods the panel to risk failure, not settle for decorative surface

    ### Medium Panel
    1. **Anselm Kiefer** – monumental panels of lead, straw, and oxidised pigment fused into geological relief
    2. **El Anatsui** – stitched bottle-cap tapestries whose metal patina shimmers like weathered armour
    3. **Jean Dubuffet** – Art Brut pioneer layering sand, tar, and raw pigment into crusty terrains
    4. **Leonardo Drew** – large wall reliefs of scorched wood and rusted metal erupting into tactile fields
    5. **Shinichi Sawada** – thick-slipped ceramic forms sprouting barnacle-like spikes and iron glaze specks
    6. **Zarina Hashmi** – delicate intaglio prints using rust solution on handmade paper, marrying fragility and time

    ## Context & Marketing Panel
    1. **Dr. Richard Sennett** – sociologist of craft celebrating tactile authenticity
    2. **Dr. Alison Landsberg** – memory‑studies scholar on embodied history
    3. **Dr. Michele Gelfand** – cultural psychologist exploring decay metaphors across societies
    4. **Banksy** – street‑art disruptor transforming erosion into spectacle
    5. **Jeff Koons** – market superstar reflecting industrial shine and value
    6. **Dave Hickey (Devil’s Advocate)** – contrarian critic demanding risk over surface

