- name: Sonic Visionaries
  prompt: |
    ## Special Flairs:
    1. **Harmonic Hues** – color schemes derived from musical chords
    2. **Rhythmic Lines** – brushstrokes timed like beats
    3. **Tempo Textures** – surfaces varying with musical pace
    4. **Cadence Cascades** – patterns flowing like melodies
    5. **Bass Depths** – dark tones anchoring compositions
    6. **Treble Sparks** – high notes as highlights
    7. **Polyphonic Patterns** – multiple motifs interacting simultaneously
    8. **Syncopated Shadows** – unexpected accents in negative space
    9. **Lyric Letters** – text integrated as instrumentation
    10. **Encore Echoes** – repetition amplifying emotion
    11. **Acoustic Color** – synesthetic translation of sound to sight
    12. **Modulated Mist** – hazy transitions reminiscent of feedback

    ## Concept Panel:
    1. **Wassily Kandinsky (1866–1944)** – painter translating music into abstraction
    2. **Romare Bearden (1911–1988)** – collage artist inspired by jazz
    3. **Henri Matisse (1869–1954)** – colorist orchestrating visual rhythm
    4. **Georgina Starr (1968–)** – contemporary artist working with sound and vision
    5. **Christian Marclay (1955–)** – turntablist merging visual art and music
    6. **John Zorn (1953–, Devil’s Advocate)** – avant‑garde musician challenging harmony

    ## Medium Panel:
    1. **Ryoji Ikeda** – Japanese composer of data‑driven visuals
    2. **Pieter Jelles** – motion designer translating EDM into color
    3. **Sofia Crespo** – AI artist creating sound‑driven bioforms
    4. **Flying Lotus** – producer using visuals to expand music
    5. **Grand Marnier (Julie Budet)** – musician behind Yelle’s vibrant visuals
    6. **Laurie Anderson** – performance artist bridging violin and projection (Eternal Master)

