- name: Japanese City Pop Curators
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Fender Rhodes Piano** – the smooth, bell-like electric piano sound that is the heart of city pop
    2. **Slap Bass** – clean, funky, and virtuosic bass playing
    3. **Gated Reverb on the Snare** – the classic, punchy, 80s snare drum sound
    4. **Clean, Nile Rodgers-style Guitar** – tight, rhythmic, and melodic funk guitar
    5. **Brass Section Stabs** – sharp, powerful horn section accents
    # Light/Color (Sound Analogs)
    6. **Tokyo at Night** – a sound that evokes neon lights, sleek cars, and urban sophistication
    7. **Seaside Freeway** – a bright, open, and breezy sound, perfect for driving along the coast
    8. **Pastel Anime Sky** – the soft, optimistic, and slightly nostalgic color palette of 80s anime
    9. **Cassette Tape Warmth** – a smooth, analog, and slightly compressed sound
    10. **Bubble-Era Optimism** – a feeling of economic boom, confidence, and carefree luxury
    # Philosophy/Process
    11. **Wasei Pop (Japanese-made pop)** – a self-aware adoption and refinement of Western styles like AOR, funk, and disco
    12. **Urban Romanticism** – lyrics and moods that idealize city life, romance, and technology
    13. **Technological Marvel** – a celebration of new technologies like the Walkman and high-fidelity audio
    14. **Sophisticated Escapism** – creating a smooth, luxurious soundtrack to escape the pressures of daily life
    15. **The YouTube Algorithm** – the primary force behind the genre's 21st-century global rediscovery

    ## Concept Panel:
    1. **Tatsuro Yamashita** – a key singer, songwriter, and producer in the city pop genre
    2. **Haruomi Hosono** – member of Yellow Magic Orchestra and a prolific producer who explored many related genres
    3. **Steely Dan** – American jazz-rock band whose sophisticated arrangements and pristine production were a major influence
    4. **Hiroshi Nagai** – the illustrator whose bright, clean, and optimistic poolside scenes defined the visual aesthetic of city pop
    5. **Issei Sagawa** – a Japanese director whose 80s commercials and music videos captured the era's slick, high-tech feel
    6. **Ryuichi Sakamoto (Devil's Advocate)** – fellow YMO member and composer whose work was often more experimental, political, and avant-garde, and who would challenge the commercial and apolitical nature of city pop.

    ## Medium Panel:
    1. **Mariya Takeuchi** – singer whose song \"Plastic Love\" became a viral sensation and the anthem of the city pop revival
    2. **Toshiki Kadomatsu** – a key producer and artist known for his funky, high-energy sound
    3. **Anri** – singer whose albums like *Timely!!* are considered classics of the genre
    4. **Vaporwave (as a genre)** – the internet-based microgenre that heavily sampled city pop and was a catalyst for its rediscovery
    5. **Macross 82-99** – a future-funk producer who heavily samples and reinterprets city pop
    6. **Daft Punk (Devil's Advocate)** – French electronic duo who were also deeply influenced by 70s and 80s funk and disco, but whose use of robotics, repetition, and house music rhythms would offer a different path of evolution for the source material.

    ## Context & Marketing Panel:
    1. **The YouTube Algorithm** – the non-human curator that is arguably most responsible for the genre's global popularity
    2. **Van Paugam** – a Chicago-based DJ and YouTuber who was a key human curator and evangelist for the genre
    3. **Light in the Attic Records** – a reissue label that has released a series of well-curated city pop compilations
    4. **TikTok** – the platform where city pop songs often find new life as the soundtrack to memes and videos
    5. **Studio Ghibli** – whose nostalgic, beautifully rendered films often share a similar emotional and aesthetic space
    6. **Mark Fisher (Devil’s Advocate)** – a cultural theorist who might argue that the city pop revival is a form of “hauntology,” a nostalgia for the lost future of a stable, prosperous, and technologically optimistic capitalism.

