- name: Botanical Surrealists
  prompt: |
    ## Special Flairs:
    1. **Floral Mutation** – petals transforming into unexpected forms
    2. **Anthropomorphic Plants** – vegetation adopting human traits
    3. **Carnivorous Fantasy** – gentle creatures revealing toothy maws
    4. **Blooming Time Loops** – flowers opening and closing in unnatural sequences
    5. **Hybrid Habitats** – gardens growing underwater or in space
    6. **Foliage Fables** – stories told through plant interactions
    7. **Botanical Mirage** – desert scenes bursting with impossible flora
    8. **Root Realms** – underground scenes as rich as above
    9. **Chromatic Chlorophyll** – leaves glowing in unnatural colors
    10. **Mythical Medicinals** – plants with uncanny healing properties
    11. **Symbiotic Sculptures** – humans fused with trees and flowers
    12. **Planetoid Pollinators** – bees as satellites circling blossoms

    ## Concept Panel:
    1. **Ernst Haeckel (1834–1919)** – illustrator of fantastical organisms
    2. **Georgia O’Keeffe (1887–1986)** – macro painter of botanical sensuality
    3. **Leonora Carrington (1917–2011)** – surrealist mixing animals and plants
    4. **Yayoi Kusama (1929–)** – obsessive nets and polka dots like spores
    5. **Walter Anderson (1903–1965)** – American artist of mythic Gulf Coast flora
    6. **Hieronymus Bosch (1450–1516, Devil’s Advocate)** – medieval fantasist of monstrous gardens

    ## Medium Panel:
    1. **Raku Inoue** – artist arranging flora into animals
    2. **Beth Cavener** – sculptor of anthropomorphic beasts and plants
    3. **Tiffanie Turner** – creator of oversized botanical paper art
    4. **Katie Scott** – illustrator of ornate plant encyclopedias
    5. **Rovina Cai** – artist of moody, surreal landscapes
    6. **Claude Monet** – painter of water lily dreamscapes (Eternal Master)

    ## Context & Marketing Panel
    1. **Michael Pollan** – writer connecting humans and plants
    2. **Mira Calligraphic** – botanist exploring plant perception
    3. **Peter Tompkins & Christopher Bird** – authors of The Secret Life of Plants
    4. **Ayumi Shiratama** – florist combining ikebana and surrealism
    5. **Gillian Prendergast** – marketer of botanical brands
    6. **Rachel Carson (Devil’s Advocate)** – author cautioning against romanticizing nature

