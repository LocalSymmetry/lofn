- name: Afrofuturist Alchemists
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Ankara Circuits** – traditional West African fabrics with embedded, glowing circuitry
    2. **Recycled E-Waste** – discarded technology woven into masks, jewelry, and sculpture
    3. **Cosmic Mudcloth** – bogolanfini patterns that depict constellations and star charts
    4. **Kente-Gram** – woven patterns that encode data or algorithmic art
    5. **Bio-Luminescent Beads** – jewelry that pulses with living light
    # Light/Color
    6. **Nebula Indigo** – the deep, cosmic blue of traditional indigo dyes
    7. **Solar-Flare Gold** – the brilliant, regal gold of Ashanti regalia and suns
    8. **Vibrant Voodoo** – the saturated, high-energy palettes associated with Vodun rituals
    9. **Lagos Neon** – the electric, cyber-noir glow of a futuristic African metropolis
    10. **Black-Light Body Paint** – traditional scarification and body art revealed under UV light
    # Philosophy/Process
    11. **The Ancient Future** – seeing advanced technology and deep history as a single, continuous loop
    12. **Reclaiming the Narrative** – using sci-fi to imagine futures free from colonial history
    13. **Techno-Animism** – belief that spirits and consciousness can inhabit technology
    14. **The Black Speculative** – creating new mythologies, not just re-interpreting old ones
    15. **Sankofa-Tech** – the principle of reaching back to the past to retrieve knowledge for the future

    ## Concept Panel:
    1. **Sun Ra** – musician and philosopher who created a whole cosmology around the “Astro-Black” race
    2. **Octavia Butler** – science fiction author who explored themes of power, genetics, and alien symbiosis
    3. **Jean-Michel Basquiat** – artist whose work is a cryptic fusion of street art, anatomical drawings, and historical critique
    4. **Wangechi Mutu** – Kenyan artist creating cyborg, mythological figures from collage and sculpture
    5. **Pedro Bell** – artist for the Parliament-Funkadelic collective, the visual architect of their cosmology
    6. **Stanley Crouch (Devil's Advocate)** – jazz critic and cultural traditionalist who often argued against fusion and what he saw as the dilution of the “pure” Black aesthetic.

    ## Medium Panel:
    1. **Yinka Shonibare** – British-Nigerian artist who uses Dutch wax fabrics to explore colonialism and identity
    2. **El Anatsui** – Ghanaian artist who creates vast, shimmering tapestries from bottle caps and recycled aluminum
    3. **Hew Locke** – artist who modifies statues and creates elaborate, baroque assemblages to critique history
    4. **Cyrus Kabiru** – Kenyan artist who creates elaborate eyewear (“C-Stunners”) from found objects
    5. **Lina Iris Viktor** – Liberian-British artist who uses a restricted palette of black, white, blue, and 24-karat gold to create regal, symbolic portraits
    6. **Kara Walker (Devil's Advocate)** – artist whose stark, brutal silhouettes of the antebellum South would serve as a constant, grounding reminder of the historical trauma that Afrofuturism seeks to escape and transcend.

    ## Context & Marketing Panel:
    1. **Mark Dery** – cultural critic who first coined the term \"Afrofuturism\" in his 1994 essay \"Black to the Future\"
    2. **Dr. Alondra Nelson** – sociologist and author of *The Social Life of DNA*, on race and genetics
    3. **Ytasha Womack** – author of *Afrofuturism: The World of Black Sci-Fi and Fantasy Culture*
    4. **Ryan Coogler & the creators of Black Panther** – filmmakers who brought Afrofuturism to a global mass audience
    5. **Janelle Monáe** – musician whose concept albums and visuals have built an entire Afrofuturist world
    6. **Thomas Chatterton Williams (Devil’s Advocate)** – writer and critic of racial identity politics who would question the essentialism and separatism that can sometimes arise in Afrofuturist thought.

