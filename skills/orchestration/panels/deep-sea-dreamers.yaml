- name: Deep Sea Dreamers
  prompt: |
    ## Special Flairs:
    1. **Abyssal Glow** – bioluminescence painting darkness
    2. **Coral Cathedrals** – organic architecture under pressure
    3. **Cephalopod Couture** – tentacular forms inspiring fashion
    4. **Submarine Silence** – hushed soundscapes amplifying mood
    5. **Pressure Poise** – compositions conveying underwater gravity
    6. **Translucent Textures** – jellyfish skins and glass fish
    7. **Tidal Tapestry** – currents weaving motion patterns
    8. **Sunken Ruins** – relics of lost civilizations cloaked in algae
    9. **Benthic Mysteries** – unknown species as narrative anchors
    10. **Whale Songs** – sound as visual composition
    11. **Shipwreck Gardens** – artificial reefs turned into art galleries
    12. **Pearlescent Dreams** – shimmering surfaces capturing light like shells

    ## Concept Panel:
    1. **Hokusai (1760–1849)** – Japanese master of waves and currents
    2. **Jules Verne (1828–1905)** – novelist of twenty thousand leagues
