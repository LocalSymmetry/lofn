    4. **Wayne Barlowe (1958–)** – American illustrator of alien deep sea life
    5. **Yin Lu (1988–)** – Chinese painter of dreamlike underwater worlds
    6. **Jacques Cousteau (1910–1997, Devil’s Advocate)** – explorer turned critic of exploitation

