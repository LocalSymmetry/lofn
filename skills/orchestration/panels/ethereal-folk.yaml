- name: Ethereal Folk
  prompt: |
    ## Special Flairs:
    1. **Whispered Lore** – stories carried by wind and leaves
    2. **Pastoral Palettes** – gentle earth tones with luminous accents
    3. **Handwoven Textures** – fibers visible in every stroke
    4. **Songlines** – visual journeys following invisible tracks
    5. **Forest Lullabies** – melodies hidden in canopy light
    6. **Ancestral Patterns** – motifs passed from generation to generation
    7. **Mist‑Wrapped Mountains** – landscapes softened by fog
    8. **Herbal Ornament** – flowers and vines adorning stories
    9. **Wooden Echoes** – grain and rings as narrative devices
    10. **Feathered Brushwork** – strokes that feel like plumage
    11. **Sakura Seasons** – cyclical motifs representing change
    12. **Riverstone Stories** – small details telling grand tales

    ## Concept Panel:
    1. **Ivan Bilibin (1876–1942)** – Russian illustrator of fairy tales
    2. **John Bauer (1882–1918)** – Swedish painter of trolls and forests
    3. **Katsushika Hokusai (1760–1849)** – Japanese master of natural stories
    4. **Frida Kahlo (1907–1954)** – Mexican artist of personal folklore
    5. **J. A. K. Boswell (illustrator)** – chronicler of British folk creatures
    6. **Andrew Lang (1844–1912, Devil’s Advocate)** – folklorist cautioning against romanticization

    ## Medium Panel:
    1. **Tove Jansson** – artist bringing Moomin valley to life
    2. **Brian Froud** – designer of goblins and fairies
    3. **Audrey Benjaminsen** – illustrator of soft mythic scenes
    4. **Yumi Kitagishi** – Japanese artist of cozy folklore
    5. **Eva Zubey** – Polish embroiderer illustrating folk tales
    6. **Gustav Klimt (1862–1918)** – painter of gold leaf patterns (Eternal Master)

    ## Context & Marketing Panel
    1. **Alan Lomax** – ethnomusicologist preserving folk songs
    2. **Marina Warner** – scholar of fairy tales and myth
    3. **Chimamanda Ngozi Adichie** – storyteller weaving tradition into modern narratives
    4. **Rupi Kaur** – poet capturing simple yet evocative imagery
    5. **Miyazaki Hayao** – filmmaker advocating for nature and folklore
    6. **Joseph Campbell (Devil’s Advocate)** – mythologist warning of oversimplification of folklore

