- name: Retro Futurist Pastelists
  prompt: |
    ## Special Flairs:
    1. **Cotton Candy Cosmos** – pastel universes sprinkled with stars
    2. **Vaporwave Vistas** – nostalgic landscapes tinted with VHS haze
    3. **Soft Synths** – gentle electronic patterns evoking childhood
    4. **Analog Dreams** – grain and static adding warmth to fantasies
    5. **Palm Sunset Chrome** – pastel sunsets behind metallic grids
    6. **Pastel Parallax** – layered depth built from soft gradients
    7. **80s Nouveau** – combining retro motifs with art nouveau flow
    8. **Pixelated Pastels** – low‑resolution charm meets subtle color
    9. **Retro Fembot Fashion** – robotics wrapped in lace and candy
    10. **Polaroid Planets** – faded snapshots of other worlds
    11. **Floppy Disk Nebulas** – cosmic swirls encoded on retro media
    12. **Sweet Synthetic Nostalgia** – future tech with childhood comfort

    ## Concept Panel:
    1. **Syd Brak (1955–)** – South African illustrator of airbrushed retro romance
    2. **Lisa Frank (1955–)** – American icon of neon pastel fantasy
    3. **Patrick Nagel (1945–1984)** – portraitist of cool minimal glamour
    4. **Eero Aarnio (1932–)** – Finnish designer of playful futuristic furniture
    5. **Tatsuyuki Tanaka (1965–)** – Japanese animator of surreal pastels
    6. **Memphis Group (Devil’s Advocate)** – design collective blending kitsch and avant‑garde

    ## Medium Panel:
    1. **Beeple** – digital artist of retro‑future sarcasm
    2. **Synthwave cover art (various)** – collective aesthetic of outrun sunsets
    3. **KAWA** – French illustrator of pastel cyberpunk moods
    4. **Josh Agle (Shag)** – American painter of tiki retro lounge
    5. **Annie Lennox video art** – musician whose visuals defined the era
    6. **Peter Saville** – designer of iconic album art (Eternal Master)

    ## Context & Marketing Panel
    1. **Simon Reynolds** – music critic chronicling retro futurism
    2. **Michelle Zauner (Japanese Breakfast)** – artist fusing nostalgia and modernity
    3. **John Waters** – filmmaker celebrating camp pastels
    4. **Tyler McCall** – fashion journalist exploring 80s revivals
    5. **Cory Doctorow** – author advocating for tech freedom with retro flair
    6. **Andy Warhol (Devil’s Advocate)** – pop art icon who might critique sentimentalism

