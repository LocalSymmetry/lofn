- name: Digital Decay & Archival Fever
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **JPEG Compression Artifacts** – the blocky, watercolor-like decay of a re-saved image
    2. **Glitch Patina** – the beautiful corruption of data over time
    3. **Bit Rot** – the digital equivalent of rust or fading paper
    4. **Datamosh Seams** – the violent, beautiful tearing between video frames
    5. **Dead Link Dust** – the conceptual emptiness of a 404 error
    # Light/Color
    6. **CRT Phosphor Burn** – the ghostly after-image on an old monitor
    7. **VGA Bleed** – the soft, rainbow-like bleed of old cable signals
    8. **Corrupted Palette** – color information shifting into beautiful, wrong hues
    9. **Dial-Up Gradient** – the slow, line-by-line loading of an image
    10. **Low-Bit Sunsets** – skies rendered in a limited, dithered palette
    # Philosophy/Process
    11. **Hauntological Loop** – media that feels like a ghost of a lost future
    12. **Digital Palimpsest** – seeing the ghosts of erased data underneath the surface
    13. **Anamnesis Engine** – art that forces the recall of a forgotten digital past
    14. **The Aesthetics of Loss** – finding beauty in broken links and corrupted files
    15. **Algorithmic Nostalgia** – AI attempting to recreate a past it never experienced

    ## Concept Panel:
    1. **Hito Steyerl** – filmmaker and theorist on the politics of the poor image
    2. **Rosa Menkman** – artist and theorist who codifies the language of glitch art
    3. **Tacita Dean** – artist who works with the decay of analog film in a digital age
    4. **Basinski** – composer of \"The Disintegration Loops,\" music made from decaying tapes
    5. **W. G. Sebald** – author whose novels incorporate grainy, ambiguous photos to evoke memory
    6. **Marie Kondo (Devil's Advocate)** – tidying expert whose philosophy of discarding the unnecessary is the antithesis of the archivist’s impulse

    ## Medium Panel:
    1. **JODI** – duo of net.art pioneers who create intentionally broken websites
    2. **Cory Arcangel** – artist who hacks old Nintendo cartridges and archives obsolete media
    3. **Phillip Stearns** – artist who creates textiles and prints from glitch aesthetics
    4. **Takeshi Murata** – digital artist who creates psychedelic, melting datamosh videos
    5. **Internet Archive** – the ultimate medium, a library of decaying digital ephemera
    6. **Beeple (Mike Winkelmann) (Devil's Advocate)** – digital artist whose hyper-polished, daily renders represent the relentless, forward-moving churn of content, opposing the panel's focus on decay and reflection.

    ## Context & Marketing Panel:
    1. **Dr. Lev Manovich** – theorist of software-based aesthetics
    2. **Simon Reynolds** – music critic who coined \"hauntology\" to describe nostalgia for lost futures
    3. **Adam Curtis** – documentary filmmaker who uses archival footage to create grand, associative narratives
    4. **Rick Prelinger** – archivist and founder of the Prelinger Archives of ephemeral films
    5. **Ken Burns** – filmmaker whose documentary style has defined the popular aesthetic of the archive
    6. **Evgeny Morozov (Devil’s Advocate)** – technology critic who would argue that a focus on digital decay is a romantic, apolitical nostalgia that ignores the real power structures of big tech.

