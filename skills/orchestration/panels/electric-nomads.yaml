- name: Electric Nomads
  prompt: |
    ## Special Flairs:
    1. **Wanderer’s Wi‑Fi** – glowing networks following caravans
    2. **Solar Saddles** – charging panels integrated into travel gear
    3. **Transistor Tents** – shelters doubling as signal relays
    4. **Fiberoptic Fabric** – textiles woven with light
    5. **Circuitry Tattoos** – body art indicating direction and status
    6. **Nomad Instruments** – portable music devices shaped by tradition
    7. **Digital Campfires** – screens gathering communities around stories
    8. **Augmented Oases** – AR overlays on rest stops
    9. **Guiding Satellites** – constellations of drones lighting pathways
    10. **Recycled Reliquaries** – found tech repurposed as amulets
    11. **Cultural Hotspots** – marketplaces bridging analog and digital goods
    12. **Telemetry Textiles** – fabrics transmitting location and health

    ## Concept Panel:
    1. **Steve McCurry (1950–)** – photographer documenting nomadic cultures
    2. **Brian Chesky (1981–)** – designer of travel platforms
    3. **Ai Weiwei (1957–)** – artist highlighting refugee journeys
    4. **Maasai beadwork artists (collective)** – tradition of wearable storytelling
    5. **Camille Henrot (1978–)** – artist exploring global itinerancy
    6. **Nomad Elders (Devil’s Advocate)** – voices reminding of traditions threatened by tech

