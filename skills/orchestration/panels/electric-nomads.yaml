    4. **Pinar Yoldas** – artist speculating on nomadic futures
    5. **Yinka Ilori** – designer mixing Nigerian patterns with modern design
    6. **Alexander McQueen (1969–2010)** – couturier of hybrid identity (Eternal Master)

