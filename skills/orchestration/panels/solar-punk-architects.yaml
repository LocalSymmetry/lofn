- name: Solar-Punk Architects
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Living Walls** – building facades covered in vertical gardens and moss
    2. **Algae-Filled Glass** – translucent panels that generate biofuel and provide shade
    3. **Bamboo Scaffolding** – structures made from the strong, flexible, and sustainable grass
    4. **3D-Printed Clay** – buildings constructed from locally sourced, printed earth
    5. **Mycelium Insulation** – walls grown from mushroom roots
    # Light/Color
    6. **Art Nouveau Stained Glass** – decorative, organic glass patterns that also house solar cells
    7. **Canopy-Dappled Light** – the shifting, leafy light of a forest canopy, replicated indoors
    8. **Terracotta Warmth** – the earthy, orange-red hue of baked clay
    9. **Pollen Haze** – a soft, golden atmospheric effect
    10. **Bioluminescent Pathways** – footpaths lit by glowing fungi or bacteria
    # Philosophy/Process
    11. **Radical Optimism** – a conscious rejection of dystopian futures
    12. **Community over Corporation** – designs that prioritize public space and shared resources
    13. **Regenerative Design** – creating systems that actively improve the environment
    14. **Art Nouveau Revival** – embracing the curves, ornamentation, and nature-focus of Art Nouveau
    15. **High-Tech, Low-Life** – using advanced technology to live simpler, more integrated lives with nature

    ## Concept Panel:
    1. **William Morris** – leader of the Arts and Crafts movement, who championed craft, beauty, and nature
    2. **Hayao Miyazaki** – filmmaker whose works (*Nausicaä*, *Castle in the Sky*) are touchstones for the Solarpunk aesthetic
    3. **Ursula K. Le Guin** – author whose anarchist and Taoist-influenced sci-fi offers models for sustainable societies
    4. **Luc Schuiten** – Belgian architect who creates visionary drawings of “archiborescent” cities
    5. **Kim Stanley Robinson** – science fiction author whose novels meticulously imagine plausible utopian futures
    6. **Ayn Rand (Devil's Advocate)** – objectivist philosopher who would argue that this entire movement is collectivist, irrational, and an affront to the heroic, ego-driven progress of industrial capitalism.

    ## Medium Panel:
    1. **Vincent Callebaut** – architect who designs futuristic, biophilic projects like the “Dragonfly” vertical farm
    2. **Studio Drift** – artist duo creating tech-driven sculptures and installations inspired by nature
    3. **Olalekan Jeyifous** – Nigerian-American artist who creates detailed architectural renderings of Afro-futurist and eco-futurist cities
    4. **The Pangaia (collective)** – a materials science company creating sustainable and high-tech fashion
    5. **Torre David (Caracas)** – an unfinished skyscraper occupied and adapted by a community, an accidental Solarpunk case study
    6. **Bjarke Ingels (Devil's Advocate)** – architect of “hedonistic sustainability” whose large-scale, corporate-funded projects would be challenged by the panel as a form of greenwashed capitalism, not true Solarpunk.

    ## Context & Marketing Panel:
    1. **Jay Springett** – strategist and writer who helped codify and popularize the term Solarpunk
    2. **Alex Steffen** – futurist and author of *Carbon Zero*, on bright green futures
    3. **The Center for Sustainable Systems** – research body providing the data to ground the punk fiction
    4. **Etsy** – an online marketplace that embodies the small-scale, craft-focused ethos of Solarpunk
    5. **Kickstarter** – a platform that allows for the community-funded development of Solarpunk technologies and art
    6. **Stewart Brand (Devil’s Advocate)** – founder of the *Whole Earth Catalog* and proponent of large-scale geo-engineering and nuclear power, who would argue for pragmatic, top-down solutions over decentralized, craft-based idealism.

