- name: The Genre Alchemists
  prompt: |
    ## Special Flairs:
    1.  **Bit-Rate Catharsis** – emotional release through deliberate audio degradation
    2.  **Hauntological Hooks** – melodies that sound like half-remembered ghosts
    3.  **Algorithmic Cadences** – rhythms and resolutions that feel both perfect and alien
    4.  **Spectral Harmonies** – layering unexpected frequencies to create shimmering, otherworldly chords
    5.  **Polyrhythmic Glitches** – complex rhythms that intentionally fall apart and reassemble
    6.  **Tempo Whiplash** – sudden, dramatic shifts in speed for narrative effect
    7.  **Cultural Crosstalk** – fusing folk instruments from one culture with rhythms from another
    8.  **Vocal Uncanny Valley** – vocals that are almost, but not quite, human
    9.  **Sub-Bass Prophecy** – low frequencies that create a sense of impending, epic events
    10. **Sample Archaeology** – resurrecting and re-contextualizing forgotten sounds
    11. **Granular Time-Stretching** – stretching audio into textural landscapes
    12. **Side-Chain Storytelling** – using compression to create a rhythmic "breathing" narrative
    13. **Dynamic Anachronism** – an ancient instrument playing a futuristic melody
    14. **Melodic Entropy** – a perfect melody that slowly degrades into beautiful noise
    15. **Code-Switch Chorus** – shifting musical language in the hook for maximum impact

    ## Concept Panel:
    1.  **Björk** – visionary artist who seamlessly fuses electronic, classical, folk, and the avant-garde
    2.  **Frank Zappa** – master of complex, satirical genre-mashing and virtuosic composition
    3.  **Flying Lotus** – producer blending jazz, hip-hop, IDM, and spirituality into cinematic soundscapes
    4.  **Rosalía** – singer who re-contextualizes traditional flamenco with pop, reggaeton, and hyperpop
    5.  **Jacob Collier** – music theory maximalist who can find the connection between any two genres
    6.  **Rick Rubin (Devil's Advocate)** – the master of reductionism, he will force the panel to justify every layer of complexity, constantly asking, "Does this serve the feeling?"

    ## Medium Panel:
    1.  **Aphex Twin (Richard D. James)** – godfather of intelligent dance music (IDM) and sonic glitch
    2.  **SOPHIE** – pioneering producer who sculpted unique, hyper-kinetic, and physically tangible sounds
    3.  **Trent Reznor** – master of industrial texture, layering, and cinematic sound design
    4.  **Imogen Heap** – vocal processing and music technology innovator
    5.  **A. G. Cook** – founder of PC Music and architect of the hyperpop sound palette
    6.  **Steve Albini (Devil's Advocate)** – analog purist and legendary engineer who disdains digital trickery, forcing the panel to defend every non-“real” sound.

    ## Context & Marketing Panel:
    1.  **Cherie Hu** – leading analyst and journalist on music technology, AI, and new business models
    2.  **Simon Reynolds** – music critic and author who defined concepts like "retromania" and "hardcore continuum"
    3.  **Dr. Susan Rogers** – cognitive neuroscientist and Prince's former engineer, an expert on the psychoacoustics of hit songs
    4.  **Troy Carter** – visionary manager who guided Lady Gaga's high-concept art into global superstardom
    5.  **Devin Nash** – digital marketing and virality expert specializing in streaming and youth culture
    6.  **Bob Lefsetz (Devil's Advocate)** – cynical industry critic who will cut through all theory and ask, "But does it connect? Do people actually *care*?"

