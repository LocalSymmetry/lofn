- name: Haptic Realists
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Thick Impasto** – paint so thick it becomes a low-relief sculpture
    2. **Fraying Canvas** – the raw, unfinished edge of the support becoming part of the art
    3. **Smeared Pigment** – fingerprints and palm smears left visible in the paint
    4. **Cracked Varnish** – the craquelure of an old painting, suggesting history and fragility
    5. **Scraped-Back Gesso** – revealing the raw foundation beneath the image
    # Light/Color
    6. **Corporeal Light** – light that seems to have weight and stick to surfaces
    7. **Fleshy Palettes** – colors that evoke the body: blood, bruise, skin, and fat
    8. **Greasy Sheen** – highlights that look oily, sweaty, or viscous
    9. **Caustic Shadows** – deep, dark shadows that feel acidic and unsettling
    10. **Tenebristic Focus** – a single, harsh light source illuminating flesh in darkness
    # Philosophy/Process
    11. **The Body as a Landscape** – depicting flesh with the detail of a geographical map
    12. **Paint as Flesh** – a direct, almost alchemical belief that oil paint can become meat
    13. **Unflinching Gaze** – refusing to idealize or beautify the mortal body
    14. **Psychological Portraiture** – the texture of the paint reflects the subject's inner state
    15. **The Presence of the Hand** – every brushstroke is a record of the artist's physical gesture

    ## Concept Panel:
    1. **Lucian Freud** – British painter of visceral, psychologically intense nudes and portraits
    2. **Jenny Saville** – contemporary painter of monumental, sculptural female nudes
    3. **Francis Bacon** – painter of raw, distorted, and caged figures
    4. **Chaim Soutine** – expressionist known for his paintings of animal carcasses and swirling landscapes
    5. **Rembrandt van Rijn** – master of capturing the texture and weight of aging flesh
    6. **Jean-Auguste-Dominique Ingres (Devil's Advocate)** – Neoclassical master of smooth, idealized, linear nudes who would be horrified by the visible brushwork and raw physicality.

    ## Medium Panel:
    1. **Anselm Kiefer** – artist who layers his canvases with lead, straw, and ash
    2. **Frank Auerbach** – painter who builds up and scrapes down immense thicknesses of paint
    3. **Leon Kossoff** – painter of the London School known for his dense, heavily worked surfaces
    4. **Berlinde De Bruyckere** – Belgian sculptor who uses wax and horse skins to create uncanny, flesh-like forms
    5. **Clyfford Still** – abstract expressionist whose paintings resemble fissures and torn surfaces
    6. **Alex Katz (Devil's Advocate)** – painter of cool, flat, and detached surfaces whose style is the polar opposite of haptic intensity.

    ## Context & Marketing Panel:
    1. **Dr. Laura Marks** – film theorist who developed the concept of \"haptic visuality\"
    2. **John Berger** – art critic and author of *Ways of Seeing*, on the politics of the nude
    3. **Julia Kristeva** – psychoanalyst and theorist of \"the abject\"
    4. **The School of London (collective)** – the group of post-war figurative painters who rejected abstraction
    5. **Gagosian Gallery** – a commercial gallery that has successfully marketed challenging, large-scale figurative painting
    6. **Peter Singer (Devil’s Advocate)** – moral philosopher who would raise deep ethical questions about the equation of animal and human flesh and the aesthetics of suffering.

