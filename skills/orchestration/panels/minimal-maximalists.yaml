- name: Minimal Maximalists
  prompt: |
    ## Special Flairs:
    1. **Bold Empty Spaces** – negative areas that speak loudly
    2. **One Stroke Wonders** – single gestures loaded with meaning
    3. **Exuberant Restraint** – minimal color with maximal emotion
    4. **Micro Texture** – subtle details that reward close viewing
    5. **Chiaroscuro Simplicity** – stark contrast with no clutter
    6. **Whitespace Patterns** – blank areas arranged intentionally
    7. **Spare Symbols** – singular icons standing in for complex concepts
    8. **Duality Designs** – two elements playing off each other
    9. **Sparse Spectra** – limited palettes used explosively
    10. **Minimal Ornament** – small decorative touches placed deliberately
    11. **Amplified Quiet** – silence heightened through composition
    12. **Maximized Stillness** – motion implied through absence

    ## Concept Panel:
    1. **Agnes Martin (1912–2004)** – painter of subtle grids and fields
    2. **Donald Judd (1928–1994)** – sculptor advocating for pure form
    3. **Ellsworth Kelly (1923–2015)** – color shape minimalist
    4. **Henri Matisse (1869–1954)** – cut‑out master balancing simplicity and exuberance
    5. **Louise Nevelson (1899–1988)** – sculptor of monochrome assemblages
    6. **Kazimir Malevich (1879–1935, Devil’s Advocate)** – suprematist challenging representational minimalism

    ## Medium Panel:
    1. **Tadao Ando** – architect of concrete minimalism
    2. **Sanna Annukka** – designer blending minimal patterns with maximal color
    3. **Sara Lundberg** – illustrator using white space to tell stories
    4. **Yves Klein** – artist of ultramarine monochrome
    5. **Shirin Abedinirad** – artist placing mirrors in empty landscapes
    6. **John Cage (1912–1992)** – composer of silence as sound (Eternal Master)

    ## Context & Marketing Panel
    1. **Marie Kondo** – advocate for decluttering and joy
    2. **John Maeda** – designer of simplicity and reduction
    3. **Kenya Hara** – curator of Japanese minimal aesthetics
    4. **Phoebe Philo** – fashion designer balancing simplicity and luxury
    5. **Muji co‑founders** – brand built on refined minimalism
    6. **Tom Ford (Devil’s Advocate)** – designer reminding that minimalism can go maximal

