- name: Digital Baroque
  prompt: |
    ## Special Flairs:
    1. **Pixel Rococo** – lavish ornamentation rendered in tiny squares
    2. **Futurist Filigree** – fine details woven from data streams
    3. **Glitch Gilding** – digital errors embellished with gold leaf
    4. **Virtual Velvet** – textures inviting tactile imagination
    5. **Mechanical Marble** – synthetic materials mimicking stone
    6. **Synthwave Scrolls** – luminous gradients wrapping surfaces
    7. **Cyber Frescoes** – narratives painted on holographic walls
    8. **Bitmapped Brocade** – pattern work reminiscent of woven tapestries
    9. **Augmented Allegory** – layered symbolism accessible through AR
    10. **Ornate Interfaces** – user experiences framed by flourish
    11. **Opulent Shadows** – chiaroscuro amplified by LED
    12. **Baroque Bytebeats** – compositions that sound both grand and synthetic

    ## Concept Panel:
    1. **Caravaggio (1571–1610)** – Italian master of dramatic chiaroscuro
    2. **Franz Xaver Winterhalter (1805–1873)** – German painter of aristocratic opulence
    3. **William Blake (1757–1827)** – English visionary blending poetry and image
    4. **Kara Walker (1969–)** – American artist of silhouetted narratives
    5. **Kehinde Wiley (1977–)** – portraitist placing contemporary subjects in baroque settings
    6. **Johannes Vermeer (1632–1675, Devil’s Advocate)** – Dutch master of stillness and restraint

    ## Medium Panel:
    1. **Refik Anadol** – Turkish media artist of data tapestries
    2. **Joshua Davis** – American generative designer of ornate geometry
    3. **Yoko Honda** – Japanese illustrator blending 80s neon with classic motifs
    4. **Kris Anka** – American comic artist of ornate costumes
    5. **Jakub Rozalski** – Polish painter mixing historical and futuristic baroque
    6. **Alphonse Mucha** – art nouveau pioneer (Eternal Master)

    ## Context & Marketing Panel
    1. **Philip Ball** – science writer exploring patterns and ornament
    2. **Nicholas Mirzoeff** – visual culture theorist decoding opulence
    3. **Lady Gaga** – pop artist embodying digital baroque performance
    4. **Bjork** – musician integrating baroque elements into electronic music
    5. **James Turrell** – light artist inspiring immersive grandeur
    6. **Susan Sontag (Devil’s Advocate)** – critic warning of camp excess

