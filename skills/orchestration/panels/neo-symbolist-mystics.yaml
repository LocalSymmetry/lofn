- name: Neo-Symbolist Mystics
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Gilded Ink** – linework that shimmers with metallic, alchemical properties
    2. **Cracked Tempera** – surfaces that feel like ancient, dreaming icons
    3. **Velvet Blackout** – negative space that feels plush and infinitely deep
    4. **Jeweled Impasto** – thick paint application that mimics gemstones
    5. **Ectoplasmic Wash** – translucent, ghostly layers of watercolor or ink
    # Light/Color
    6. **Chartreuse Glow** – an sickly, alluring, and supernatural green-yellow light
    7. **Nocturne Blues** – the deep, velvety blues of a late twilight or dreamscape
    8. **Sanguine Stains** – reds that feel both vital and sacrificial
    9. **Opalescent Aura** – halos and glows with shifting, pearlescent colors
    10. **Black-Iris Purple** – a purple so deep it's almost black, suggesting royalty and decay
    # Philosophy/Process
    11. **The Interior Landscape** – depicting psychological and spiritual states as places
    12. **Synaesthesia** – creating images that attempt to evoke sound, scent, and touch
    13. **Private Mythology** – using a personal, recurring set of symbols and archetypes
    14. **Elegant Macabre** – a fascination with death, decay, and the occult, rendered beautifully
    15. **Archetype Overload** – layering so many symbols (skulls, keys, lilies, moons) that meaning becomes fluid

    ## Concept Panel:
    1. **Odilon Redon** – French symbolist painter of dream-like, monstrous, and divine figures
    2. **Gustave Moreau** – symbolist painter of complex, jewel-like mythological scenes
    3. **Jean Delville** – Belgian symbolist obsessed with the occult, esoteric, and idealized forms
    4. **Austin Osman Spare** – English artist and occultist who developed automatic drawing techniques
    5. **Leonora Carrington** – surrealist painter whose work is a personal mythology of Celtic lore and alchemy
    6. **Clement Greenberg (Devil's Advocate)** – arch-formalist critic who would dismiss the entire enterprise as illustrative, literary, and anti-modernist nonsense.

    ## Medium Panel:
    1. **Vania Zouravliov** – contemporary Russian illustrator with a dark, intricate, and erotic style
    2. **James Jean** – contemporary painter whose work overflows with fluid, symbolic imagery
    3. **Guillermo del Toro** – filmmaker whose creature designs and sets are rich with symbolic detail
    4. **Marcos Lutyens** – artist who uses hypnosis to explore inner landscapes
    5. **FKA Twigs** – musician and performer who embodies modern, occult-infused symbolism
    6. **Takato Yamamoto (Devil's Advocate)** – Japanese Heisei-era artist whose “Ukiyo-e Pop” would challenge the European focus, offering a different, flatter, more graphic approach to erotic macabre.

    ## Context & Marketing Panel:
    1. **Carl Jung** – psychoanalyst whose work on archetypes and the collective unconscious is foundational
    2. **Joris-Karl Huysmans** – author of *À rebours*, the so-called \"bible\" of the Decadent movement
    3. **Alejandro Jodorowsky** – filmmaker and mystic whose work is a torrent of psychomagic and symbolism
    4. **The Last Tuesday Society & Viktor Wynd's Museum of Curiosities** – modern purveyors of the esoteric and macabre
    5. **A24 Films** – film distributor that has successfully marketed atmospheric, symbol-rich horror/drama
    6. **Camille Paglia (Devil’s Advocate)** – cultural critic who would analyze the pagan, chthonic energies but relentlessly critique any perceived sentimentality or lack of intellectual rigor.

