- name: Micro-Vignette Storytellers
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Warm, Filmic Grain** – a soft, nostalgic texture that makes the scene feel like a memory
    2. **Shallow Depth of Field** – focusing on one small detail and letting the rest blur away
    3. **Natural, Un-Lit Look** – using only available light, like a window or a single lamp
    4. **Handheld, Gentle Movement** – the camera feels like it's breathing with the character
    5. **Tactile Close-Ups** – focusing on the texture of hands, fabric, or a cup of tea
    # Light/Color
    6. **Golden Hour Light** – the warm, soft, and long-shadowed light of early morning or late afternoon
    7. **Muted, Earthy Palette** – colors that are gentle, natural, and calming
    8. **Single-Source Lighting** – a dramatic, chiaroscuro effect from a single candle or lightbulb
    9. **Lens Flare** – the soft, hazy flare of sunlight hitting the lens
    10. **Faded, Nostalgic Grading** – a color grade that feels like a faded photograph
    # Philosophy/Process
    11. **One Perfect Moment** – the video is not a story, but a single, perfectly captured moment or feeling
    12. **The Poetry of the Mundane** – finding profound beauty in the most ordinary, everyday actions
    13. **Show, Don't Tell** – conveying the entire emotion through visuals, with little or no text or dialogue
    14. **Cottagecore / Goblincore** – an aesthetic that celebrates a romanticized, peaceful, and nature-centric life
    15. **ASMR Ambiance** – a quiet, peaceful soundtrack of natural sounds (rain, birdsong, a crackling fire)

    ## Concept Panel:
    1. **Yasujirō Ozu** – Japanese filmmaker, a master of finding profound meaning in quiet, everyday family life
    2. **Johannes Vermeer** – Dutch painter who captured quiet, intimate moments of domestic life with incredible light
    3. **Mary Oliver** – poet who wrote about nature, attention, and finding wonder in the small things
    4. **The Instagram \"Core\" Aesthetics** – the user-generated movements of Cottagecore, Goblincore, etc.
    5. **Alice Waters** – chef and food activist whose philosophy is about the beauty of simple, perfect, local ingredients
    6. **Martin Scorsese (Devil's Advocate)** – a filmmaker of high energy, urban anxiety, and rapid-fire editing, who would get bored and demand that “something happen.”

    ## Medium Panel:
    1. **Audrey Tautou (as Amélie)** – the character who embodies the spirit of finding magic in the mundane
    2. **Koyaanisqatsi (Godfrey Reggio)** – a film that uses slow-motion and time-lapse to create a poetic meditation on modern life
    3. **Lo-Fi Girl (YouTube channel)** – a creator who has built a massive audience around a single, looping, peaceful vignette
    4. **Terrence Malick** – filmmaker known for his whispered voiceovers and dreamy, golden-hour shots of nature
    5. **Chantal Akerman** – Belgian filmmaker whose movie *Jeanne Dielman* is a masterpiece of real-time domestic mundanity
    6. **Michael Bay (Devil's Advocate)** – a director whose entire aesthetic is based on explosions, fast cuts, and maximalist spectacle, the complete antithesis of the micro-vignette.

    ## Context & Marketing Panel:
    1. **The Mindfulness Movement** – a cultural shift towards attention, presence, and finding calm
    2. **The Slow Living Movement** – an ethos that rejects the fast-paced nature of modern life
    3. **Kinfolk (magazine)** – a magazine that helped to define the minimalist, rustic, and mindful aesthetic
    4. **ASMR Community** – a group that seeks out quiet, calming, and detailed content
    5. **Pinterest** – a platform that is driven by the creation and curation of aesthetic vignettes
    6. **Gary Vaynerchuk (Devil’s Advocate)** – a hustle-culture entrepreneur and marketing guru who would argue that this content is too slow, too quiet, and not optimized for the attention economy.

