- name: Slow-Mo Catharsis Crew
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Exploding Water Balloons** – the beautiful, fleeting sculpture of a water balloon at the moment of impact
    2. **Shattering Glass** – the intricate, fractal patterns of glass as it breaks
    3. **Flowing Fabric** – the graceful, wave-like movement of fabric in the wind
    4. **Mixing Paint** – the satisfying, swirling clouds of color as different paints are mixed
    5. **Dry Ice Sublimation** – the thick, rolling clouds of CO2 gas from dry ice
    # Light/Color
    6. **High-Key Lighting** – bright, clean, and even lighting that eliminates most shadows
    7. **Saturated, Primary Colors** – a simple, vibrant, and visually pleasing color palette
    8. **Backlit Particles** – dust, water droplets, or glitter illuminated from behind
    9. **Clean, White Background** – isolating the action against a pure, distraction-free background
    10. **Reflective Surfaces** – using mirrors or water to create beautiful, symmetrical images
    # Philosophy/Process
    11. **Revealing the Invisible** – using high-speed cameras to see the beauty in moments that are too fast for the human eye
    12. **The Physics of Beauty** – a celebration of the elegant physical laws that govern our world
    13. **Controlled Chaos** – setting up an experiment and letting the physics play out
    14. **Pure Visual Pleasure** – the goal is not to tell a story, but to create a moment of pure aesthetic delight
    15. **Music-Driven Pacing** – editing the slow-motion shots to match the emotional arc of a piece of music

    ## Concept Panel:
    1. **Harold Edgerton** – the scientist and photographer who pioneered high-speed flash photography
    2. **Eadweard Muybridge** – the photographer who first captured motion with his studies of horses galloping
    3. **Busby Berkeley** – choreographer whose work was about creating beautiful, moving, geometric patterns
    4. **Yves Klein** – artist known for his use of a single, powerful color and for his “Anthropometry” paintings made with human bodies
    5. **The MythBusters (Adam Savage and Jamie Hyneman)** – television hosts who used science and high-speed cameras to deconstruct myths and create spectacle
    6. **Henri Cartier-Bresson (Devil's Advocate)** – a photographer who believed in capturing the “decisive moment” with a single, un-manipulated shot, and would argue that slow-motion is a form of artificial spectacle that misses the point of photography.

    ## Medium Panel:
    1. **The Slow Mo Guys** – the most famous high-speed YouTube channel
    2. **Phantom Flex4K Camera** – the piece of high-end technology that makes this aesthetic possible
    3. **OK Go (the band)** – a band whose music videos often feature single-take, slow-motion, and Rube Goldberg-style spectacles
    4. **Adam Magyar** – a photographer and video artist who uses high-speed cameras to capture urban life in a painterly way
    5. **Stephen Wilkes** – a photographer who creates “Day to Night” images, a form of time compression that is the opposite of slow-motion's time expansion
    6. **Jean-Luc Godard (Devil's Advocate)** – a filmmaker of the French New Wave who used jump cuts and other jarring techniques to disrupt the smooth, pleasurable flow of classical cinema, and would argue that slow-motion is a bourgeois indulgence.

    ## Context & Marketing Panel:
    1. **The discovery of the “Oddly Satisfying” phenomenon** – the cultural context for why this content is so popular
    2. **The use of slow-motion in sports broadcasting** – which has trained audiences to appreciate the beauty of athletic feats in detail
    3. **Apple's “Shot on iPhone” campaigns** – which have often used slow-motion to highlight the camera's capabilities
    4. **The a-ha “Take On Me” music video** – a classic example of using a special visual technique to create an unforgettable video
    5. **Discovery Channel / National Geographic** – networks that have a long history of using high-speed footage in their nature documentaries
    6. **Susan Sontag (Devil’s Advocate)** – a cultural critic who, in her essay “On Photography,” wrote about how photography can turn suffering into beautiful spectacle, and would question the ethics of making explosions and destruction look so appealing.

