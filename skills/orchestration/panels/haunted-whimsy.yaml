- name: Haunted Whimsy
  prompt: |
    ## Special Flairs:
    1. **Playful Apparitions** – ghosts depicted as companions rather than fears
    2. **Ethereal Playgrounds** – abandoned spaces repurposed for joy
    3. **Pastel Phantoms** – spirits tinted in soft hues
    4. **Wistful Whispers** – text woven like faint voices
    5. **Vintage Toys** – nostalgic objects with eerie charm
    6. **Fading Fabrics** – transparency conveying the passing of time
    7. **Childlike Curiosity** – exploration through innocent eyes
    8. **Sentimental Darkness** – comfort found within shadows
    9. **Antique Animation** – old cartoons inspiring ghostly characters
    10. **Floral Graveyards** – blossoms growing from forgotten places
    11. **Melodic Melancholy** – music boxes and lullabies echoing through scenes
    12. **Shadow Puppetry** – silhouettes telling bittersweet stories

    ## Concept Panel:
    1. **Edward Gorey (1925–2000)** – illustrator of macabre whimsy
    2. **Henry Darger (1892–1973)** – outsider artist of epic childlike myths
    3. **Hayao Miyazaki (1941–)** – filmmaker mixing spirits and innocence
    4. **Tim Burton (1958–)** – director of darkly whimsical worlds
    5. **Tove Jansson (1914–2001)** – creator of the Moomins’ gentle hauntings
    6. **Charles Addams (1912–1988, Devil’s Advocate)** – cartoonist reminding us of the absurd

    ## Medium Panel:
    1. **James Jean** – painter of enchanted children and spirits
    2. **Lisa Hanawalt** – illustrator of quirky anthropomorphic beings
    3. **Rebecca Green** – artist of haunted yet tender portraiture
    4. **Maggie Taylor** – digital collagist of Victorian ghosts
    5. **Shaun Tan** – graphic novelist of surreal everyday objects
    6. **Edward Hopper** – painter whose empty rooms feel haunted (Eternal Master)

    ## Context & Marketing Panel
    1. **Neil Gaiman** – storyteller balancing whimsy and darkness
    2. **Shel Silverstein** – poet exploring humor and sadness
    3. **Ransom Riggs** – author of the Peculiar Children series
    4. **Sarah Andersen** – cartoonist capturing anxious whimsy
    5. **Susan Cooper** – writer weaving folklore into children’s fantasy
    6. **Stephen King (Devil’s Advocate)** – horror writer pushing boundaries of comfort

