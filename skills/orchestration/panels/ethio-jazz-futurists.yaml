- name: Ethio-Jazz Futurists
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Vibraphone Shimmer** – the wavering, metallic, and slightly mysterious sound of the vibraphone
    2. **Washed-Out Farfisa Organ** – the reedy, slightly distorted sound of a 1960s combo organ
    3. **Tenor Sax (modal)** – saxophone playing that is searching, melodic, and based on Ethiopian scales
    4. **Brushed Snare & Driving Bass** – a rhythm section that is both relaxed and propulsive
    5. **Fuzz Guitar** – a raw, distorted electric guitar, often playing pentatonic riffs
    # Light/Color (Sound Analogs)
    6. **Addis Ababa Nightclub** – a sound that feels warm, smoky, and slightly hazy
    7. **Tej-Soaked** – a golden, honey-wine warmth and slight wooziness
    8. **Swinging Addis** – the optimistic, cosmopolitan, and slightly melancholic feel of 1960s/70s Ethiopia
    9. **East African Sun** – a bright, hot, and slightly dusty sonic quality
    10. **Red, Gold, and Green** – a sonic palette that evokes the colors of the Ethiopian flag
    # Philosophy/Process
    11. **An-Anbivalence of Influence** – a sound that is undeniably Ethiopian but also deeply influenced by American jazz and funk
    12. **The Pentatonic Scale** – using the traditional 5-note Ethiopian scales as a basis for improvisation
    13. **Tezeta** – a specific musical mode and feeling in Ethiopian music that means nostalgia or bittersweet longing
    14. **Instrumental Storytelling** – conveying complex emotions and narratives without words
    15. **Modern Antiquity** – music that sounds simultaneously ancient and modern

    ## Concept Panel:
    1. **Mulatu Astatke** – the godfather of Ethio-jazz, who studied in the West and brought jazz and funk ideas back to Ethiopia
    2. **Duke Ellington** – American jazz legend whose big-band arrangements and sophisticated harmonies were a key influence
    3. **Fela Kuti** – Nigerian Afrobeat pioneer, representing a different, more politically charged and rhythmically intense fusion of African and Western music
    4. **Alice Coltrane** – spiritual jazz artist whose use of harp and organ created a similarly mystical and searching atmosphere
    5. **Getatchew Mekurya** – Ethiopian saxophonist known for his wild, raw, and powerful playing style
    6. **Wynton Marsalis (Devil's Advocate)** – jazz traditionalist and Director of Jazz at Lincoln Center, who would likely argue that Ethio-jazz is a dilution of the “pure” American blues and swing tradition.

    ## Medium Panel:
    1. **The Budos Band** – a Staten Island-based band that plays a hard-edged, funk-influenced version of Ethio-jazz
    2. **Khruangbin** – a Texas trio whose sound is a global blend of funk, soul, and psychedelia, with clear Ethio-jazz influences
    3. **Gigi** – Ethiopian singer whose work blends traditional sounds with modern production
    4. **Either/Orchestra** – an American big band that has collaborated with and championed Ethiopian musicians
    5. **Francis Falceto** – the French music producer and archivist who compiled the *Éthiopiques* series, which introduced Ethio-jazz to the world
    6. **Kamasi Washington (Devil's Advocate)** – contemporary jazz saxophonist whose style is grand, maximalist, and virtuosic, and might challenge the more understated, groove-based approach of classic Ethio-jazz.

    ## Context & Marketing Panel:
    1. **The *Éthiopiques* series** – the compilation series that is the primary document of the genre's golden age
    2. **Jim Jarmusch's *Broken Flowers*** – the film that prominently featured Mulatu Astatke's music and introduced it to a wider indie audience
    3. **Awesome Tapes From Africa (blog/label)** – a key player in the online rediscovery of African music
    4. **NPR's Tiny Desk Concerts** – a platform that has showcased many contemporary artists influenced by world music
    5. **Quantic (Will Holland)** – a British musician and producer who has extensively explored and incorporated Latin and African sounds
    6. **Paul Simon (Devil’s Advocate)** – an artist whose album *Graceland* sparked a major debate about cultural appropriation, and whose presence would force the panel to confront the ethics of Western musicians adopting non-Western sounds.

