- name: Tectonic Texture
  prompt: |
    ## Special Flairs:
    1. **Crustal Layers** – visible strata representing time
    2. **Earthquake Lines** – jagged cracks dividing compositions
    3. **Plate Collisions** – contrasting elements pushing against one another
    4. **Seismic Vibrance** – energy pulses translated into color
    5. **Geode Reveals** – crystals exposed within rough rock
    6. **Basalt Rhythms** – repeating patterns reminiscent of hexagonal columns
    7. **Magma Flow** – molten textures swirling into abstract shapes
    8. **Sediment Stories** – tiny details building into grand narrative
    9. **Erosion Etchings** – delicate marks carved by time
    10. **Mountain Shadows** – light and dark interplay creating mass
    11. **Core Heat** – warm undertones hinting at deep energy
    12. **Continental Drift** – slow change depicted through progressive panels

    ## Concept Panel:
    1. **Ansel Adams (1902–1984)** – photographer capturing geological majesty
    2. **Georgia O’Keeffe (1887–1986)** – painter of bone and earth forms
    3. **Caspar David Friedrich (1774–1840)** – romantic landscape visionary
    4. **Ai Weiwei (1957–)** – artist using rubble and ruins to provoke
    5. **Isamu Noguchi (1904–1988)** – sculptor blending organic and modern
    6. **Mary Anning (1799–1847, Devil’s Advocate)** – fossil hunter reminding us of ancient context

    ## Medium Panel:
    1. **Olafur Eliasson** – installation artist of natural phenomena
    2. **Derek Cummings** – digital artist of crystalline surfaces
    3. **Sanna Annukka** – designer inspired by Finnish geology
    4. **Charmaine Olivia** – painter of textured mountains
    5. **Darius Twin** – photographer creating light‑painted rock forms
    6. **Yayoi Kusama** – artist of infinite patterns (Eternal Master)

