- name: Brutalist Poetry
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Raw Concrete Grain** – the texture of poured concrete, with visible aggregate and imperfections
    2. **Oxidized Rebar Stains** – streaks of rust bleeding from within the concrete
    3. **Plywood Formwork Echo** – the faint impression of wood grain left by the molding process
    4. **Board-Formed Beton Brut** – textured concrete that celebrates its wooden mold
    5. **Aggregate Exposure** – revealing the stones and sand within the concrete mass
    # Light/Color
    6. **Slit Window Light** – harsh, geometric shafts of light piercing thick walls
    7. **Monochromatic Mass** – the overwhelming power of a single, uniform grey
    8. **Shadow as Structure** – using deep, sharp shadows as a building material
    9. **Water-Stain Patina** – the dark, organic patterns of moisture on concrete
    10. **Golden Hour Glow** – the warm, late-afternoon sun transforming grey into gold
    # Philosophy/Process
    11. **Honesty of Materials** – refusing to conceal the building's structure and materials
    12. **Monumental Humility** – massive scale in service of public, not private, good
    13. **The Sublime in the Mundane** – finding transcendent beauty in everyday infrastructure
    14. **Fortress of Solitude** – a sense of protective, quiet enclosure
    15. **Utopian Melancholy** – the feeling of a grand, failed, but beautiful social dream

    ## Concept Panel:
    1. **Le Corbusier** – architect and theorist, particularly his late work like Unité d'Habitation
    2. **Ernő Goldfinger** – Hungarian-born architect of iconic London brutalist towers
    3. **Lina Bo Bardi** – Italian-Brazilian architect whose concrete structures feel alive
    4. **Louis Kahn** – architect who treated concrete with a sense of ancient, spiritual weight
    5. **J.G. Ballard** – novelist whose books like *High-Rise* explore the dark psychology of concrete towers
    6. **Prince Charles (Devil's Advocate)** – vocal critic of Brutalism, famously calling it a \"monstrous carbuncle\"

    ## Medium Panel:
    1. **Hélène Binet** – photographer who captures the abstract geometry and texture of architecture
    2. **Andreas Gursky** – photographer of overwhelming, monumental modern structures
    3. **Filip Dujardin** – artist who creates photographic collages of impossible buildings
    4. **Tadao Ando** – Japanese architect known for his sensuous, poetic use of concrete
    5. **Heatherwick Studio** – design firm re-imagining concrete's potential with projects like Coal Drops Yard
    6. **Zaha Hadid (Devil's Advocate)** – architect whose fluid, parametric forms are the antithesis of brutalist blockiness, arguing for dynamism over static monumentality.

    ## Context & Marketing Panel:
    1. **Owen Hatherley** – writer and critic who champions the social and aesthetic value of Brutalism
    2. **Jonathan Meades** – architectural critic known for his provocative, intellectual documentaries
    3. **John Grindrod** – author of *Concretopia*, exploring Britain's postwar rebuilding
    4. **The National Trust** – heritage organization that has begun to conserve and tour Brutalist buildings
    5. **Instagram account @BrutalArchitecture** – a key node in the popular revival of the style
    6. **Alain de Botton (Devil’s Advocate)** – philosopher of aesthetics who would argue that while intellectually interesting, these buildings often fail to create happiness or a sense of “home” for their inhabitants.

