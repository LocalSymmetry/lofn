- name: Hyperpop Alchemists
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Bubblegum Bass** – bouncy, synthetic, almost cartoonish bass sounds
    2. **Autotune as an Instrument** – vocal processing pushed to its extreme, creating new timbres
    3. **Bitcrushed Breakdowns** – sections where the audio quality is intentionally degraded into crunchy noise
    4. **Metallic Snares** – snare drums that sound like a tin can being hit with a hammer
    5. **Glitch Stutter Edits** – rapid-fire, repetitive vocal and synth chops
    # Light/Color (Sound Analogs)
    6. **Digital Shine** – a glossy, high-treble sheen that makes everything sound synthetic and new
    7. **Energy-Drink Neon** – the lurid, saturated, almost painful colors of cheap energy drinks
    8. **Internet-Dial-Up Squelch** – the sound of a modem connecting, used as a musical element
    9. **Kawaii Overload** – an overwhelming onslaught of “cute” signifiers (chimes, giggles)
    10. **ADHD Pacing** – extremely rapid shifts in texture, tempo, and genre, often multiple times within one song
    # Philosophy/Process
    11. **The Uncanny Valley of Pop** – music that is almost, but not quite, mainstream pop music
    12. **Accelerated Culture** – reflecting the speed and chaos of internet life
    13. **Sincerity through Artifice** – using extreme fakeness and synthesis to express genuine emotion
    14. **Deconstruction of Celebrity** – playing with the tropes of pop stardom and identity
    15. **Queer Utopia** – creating a sonic space of fluid identity and radical inclusivity

    ## Concept Panel:
    1. **Andy Warhol** – pop artist whose work explored celebrity, commerce, and repetition
    2. **Haruki Murakami** – novelist whose work often blends the mundane with the surreal and references pop culture
    3. **Kyary Pamyu Pamyu** – Japanese artist whose music and videos are a masterclass in kawaii maximalism
    4. **Jeff Koons** – artist whose work embraces kitsch, gloss, and commercial aesthetics
    5. **Ryan Trecartin** – video artist whose chaotic, fast-paced work captures the feeling of internet brain
    6. **Simon Cowell (Devil's Advocate)** – music industry mogul whose entire career is based on creating polished, predictable, and mass-market pop stars, who would reject hyperpop as noisy and unmarketable.

    ## Medium Panel:
    1. **A. G. Cook** – producer and head of PC Music, a foundational figure in the genre
    2. **SOPHIE** – late producer who sculpted sound with a unique and influential physicality
    3. **100 gecs (Dylan Brady and Laura Les)** – duo who brought a chaotic, genre-blending version of hyperpop to a wider audience
    4. **Charli XCX** – pop star who embraced and championed the hyperpop sound and its creators
    5. **Danny L Harle** – producer known for his euphoric, trance-influenced take on the genre
    6. **Rick Rubin (Devil's Advocate)** – producer known for his minimalist, raw, and organic approach, who would constantly push the panel to strip away layers of artifice and find the “real” song underneath.

    ## Context & Marketing Panel:
    1. **PC Music (record label)** – the label and collective that started it all
    2. **Spotify's \"hyperpop\" playlist** – the official playlist that codified the genre and broke many artists
    3. **TikTok** – the social media platform where hyperpop's sped-up, chaotic sound thrives
    4. **Dorian Electra** – artist whose work cleverly engages with internet culture, gender theory, and history
    5. **The Needle Drop (Anthony Fantano)** – influential music critic who was an early champion of the genre
    6. **Jon Caramanica (Devil’s Advocate)** – *New York Times* pop music critic who would approach the genre with a more traditional, sociological lens, questioning its longevity and cultural substance beyond the online hype.

