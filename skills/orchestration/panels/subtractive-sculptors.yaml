- name: Subtractive Sculptors
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Carved Absence** – the shape defined not by what is there, but what was removed
    2. **Single-Block Constraint** – the feeling that the entire form was liberated from one piece of material
    3. **Tool Marks** – visible traces of the chisel, the blade, or the sanding block
    4. **Vein Following** – allowing the natural grain of wood or stone to guide the final form
    5. **Negative-Space Tension** – the charged emptiness between solid forms
    # Light/Color
    6. **Form-Revealing Light** – harsh, raking light that emphasizes shape over color
    7. **Material Monochome** – the color is simply the color of the material itself
    8. **Shadow as a Cut** – using shadow to create the illusion of a deeper carving
    9. **Polished vs. Rough** – contrasting surface treatments to catch light differently
    10. **The Color of Void** – the deep, flat black of a perfectly carved-out hole
    # Philosophy/Process
    11. **Truth to Materials** – honoring the inherent properties of the chosen medium
    12. **Finding the Figure in the Stone** – the belief that the artist's job is to release a pre-existing form
    13. **Elegant Reduction** – the art of saying more with less
    14. **The Power of the Unfinished** – intentionally leaving parts rough to show the process
    15. **Irreducible Form** – a shape so essential it cannot be simplified further

    ## Concept Panel:
    1. **Constantin Brâncuși** – Romanian sculptor who pioneered modern abstract, reductive forms
    2. **Barbara Hepworth** – English sculptor known for piercing her forms and using negative space
    3. **Isamu Noguchi** – Japanese-American artist who brought reductive elegance to stone and paper
    4. **The Cycladic Figurines (anonymous)** – ancient, minimal marble figures of profound simplicity
    5. **Gordon Matta-Clark** – artist known for his \"anarchitecture,\" cutting sections out of buildings
    6. **Auguste Rodin (Devil's Advocate)** – sculptor of expressive, additive, and emotional surfaces who would argue that subtraction removes the artist's passionate hand.

    ## Medium Panel:
    1. **Kenya Hara** – Japanese designer and art director for Muji, a master of “emptiness”
    2. **Martin Puryear** – contemporary sculptor using traditional craft to create minimal, resonant forms
    3. **Tara Donovan** – artist who creates vast sculptures from single materials like styrofoam cups
    4. **Rachel Whiteread** – artist who casts the negative space inside and around objects
    5. **Peter Zumthor** – Swiss architect whose buildings are studies in material and reduction
    6. **Lee Ufan (Devil's Advocate)** – Korean minimalist artist of the Mono-ha school, who would argue for an even more radical reduction, focusing on the unaltered encounter between stone and steel.

    ## Context & Marketing Panel:
    1. **John Pawson** – architect and author of *Minimum*
    2. **Dieter Rams** – industrial designer whose principle was \"less, but better\"
    3. **Cal Newport** – author of *Digital Minimalism*, applying reductive philosophy to modern life
    4. **Axel Vervoordt** – Belgian designer who champions the Wabi-Sabi aesthetic of imperfection and simplicity
    5. **Jony Ive** – former Chief Design Officer at Apple, who brought minimalism to mass-market tech
    6. **Jeff Koons (Devil’s Advocate)** – maximalist artist whose work celebrates ornamentation, spectacle, and additive processes, representing the complete opposite philosophy.

