- name: Filter-Core Glitch Artists
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Datamosh Transitions** – using video compression errors as a creative wipe
    2. **Pixel Sorting** – a glitch effect that stretches pixels into beautiful, flowing lines
    3. **RGB Split** – an effect that separates the red, green, and blue channels of the video
    4. **AI-Generated Textures** – using neural networks to create uncanny, shifting surfaces
    5. **Liquify Tool Smears** – a Photoshop tool used on video to create a melting, distorted effect
    # Light/Color
    6. **Chromatic Aberration** – the color fringing of a cheap lens, exaggerated for effect
    7. **Over-Saturated, Blown-Out Colors** – a deliberately unnatural and intense color palette
    8. **Inverted Colors** – a negative-image effect used for dramatic, alienating moments
    9. **Lens Distortion** – the extreme fisheye or warping of a wide-angle lens
    10. **Strobing, Flickering Lights** – rapid-fire flashes of color and light
    # Philosophy/Process
    11. **The Filter as the Art** – the video is not just *shot*, it is *processed*, and the processing is the main event
    12. **Digital Surrealism** – using technology to create modern-day surrealist films
    13. **The Uncanny Valley** – playing with filters that make human faces look almost, but not quite, real
    14. **Meme-Ready** – creating a strange, compelling visual that is easily turned into a meme
    15. **Embracing the Error** – turning a technological mistake into a deliberate aesthetic choice

    ## Concept Panel:
    1. **Salvador Dalí** – surrealist painter whose work feels like a pre-digital glitch in reality
    2. **David Lynch** – filmmaker whose work is full of inexplicable, dreamlike, and often terrifying digital video artifacts
    3. **Nam June Paik** – the father of video art, who used magnets and other tools to distort television signals
    4. **Tim & Eric** – comedians whose work uses bad public-access TV aesthetics and glitchy editing to create a deeply unsettling and hilarious universe
    5. **Stan Brakhage** – experimental filmmaker who physically scratched, painted, and baked his film strips
    6. **Ansel Adams (Devil's Advocate)** – a photographer who believed in technical perfection, pure representation of nature, and the F/64 group's focus on sharp, unadulterated reality.

    ## Medium Panel:
    1. **Bill Viola** – video artist who uses slow-motion and other digital effects to create spiritual, painterly works
    2. **Takeshi Murata** – an artist known for his psychedelic, melting, and datamoshed animations
    3. **Cool 3D World** – an animation project that creates deeply unsettling, surreal, and glitchy short films
    4. **AR Filter Creators (on Spark AR and TikTok)** – the new generation of artists creating interactive, surreal filters
    5. **Sam Spratt** – a painter who has successfully mimicked digital glitch effects using traditional oil paint
    6. **Werner Herzog (Devil's Advocate)** – a filmmaker who seeks an “ecstatic truth” through raw, un-filtered reality, and would despise the use of digital filters as a form of cowardice or gimmickry.

    ## Context & Marketing Panel:
    1. **The rise of Augmented Reality (AR)** – the technology that powers filters on Instagram and TikTok
    2. **Snapchat** – the company that pioneered the use of playful, identity-transforming AR filters
    3. **Vaporwave** – the aesthetic movement that celebrated and critiqued the glitchy, surreal nature of early digital graphics
    4. **Creepypasta and Internet Folklore** – a cultural context for how glitches and digital errors can become sources of horror
    5. **Super Deluxe (former media company)** – a company that produced many viral, surreal, and filter-heavy videos
    6. **Jonathan Franzen (Devil’s Advocate)** – a novelist and cultural critic who would likely view the entire phenomenon as a symptom of a shallow, narcissistic, and technology-obsessed culture that is losing its connection to authentic human experience.

