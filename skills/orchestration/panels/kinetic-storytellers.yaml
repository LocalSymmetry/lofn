- name: Kinetic Storytellers
  prompt: |
    ## Special Flairs:
    1. **Motion Comics** – panels arranged like frames in animation
    2. **Dynamic Typography** – words moving with meaning
    3. **Temporal Transitions** – scenes fading in rhythm with narrative
    4. **Body Narratives** – choreography telling the story
    5. **Fluid Panels** – frames that expand and contract
    6. **Speed Lines** – streaks indicating pace and emotion
    7. **Interactive Illustrations** – elements responding to viewer input
    8. **Sequential Sculpture** – 3D pieces viewed as a timeline
    9. **Rhythm Ribbons** – visual lines carrying narrative beat
    10. **Flipbook Feel** – subtle flicker giving life to still images
    11. **Gesture Glitches** – purposeful errors showing the path taken
    12. **Kinetic Collage** – fragments arranged to simulate motion

    ## Concept Panel:
    1. **Winsor McCay (1869–1934)** – pioneer of animation and comic timing
    2. **Eadweard Muybridge (1830–1904)** – photographer studying movement
    3. **Saul Steinberg (1914–1999)** – cartoonist of expressive line
    4. **Kara Walker (1969–)** – silhouette artist animating history
    5. **Utagawa Kuniyoshi (1798–1861)** – Japanese printmaker of dynamic stories
    6. **Pina Bausch (1940–2009, Devil’s Advocate)** – choreographer pushing physical storytelling

    ## Medium Panel:
    1. **Genndy Tartakovsky** – animator known for expressive action
    2. **Sally Cruikshank** – creator of surreal movement in film
    3. **William Kentridge** – South African artist combining drawing and motion
    4. **Mirai Mizue** – Japanese abstract animator
    5. **Isaac King** – stop‑motion filmmaker exploring social issues
    6. **Chuck Jones (1912–2002)** – Looney Tunes director (Eternal Master)

    ## Context & Marketing Panel
    1. **Scott McCloud** – theorist of comics and sequential art
    2. **Lotte Reiniger** – pioneer of silhouette animation
    3. **Henry Jenkins** – scholar on convergence culture and transmedia
    4. **Cathy Park Hong** – poet exploring narratives through form
    5. **Mark Morris** – choreographer bridging music and motion
    6. **Roland Barthes (Devil’s Advocate)** – semiotician challenging authorial intent

