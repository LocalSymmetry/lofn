- name: Cumbia Rebajada Sonideros
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Pitched-Down Vocals** – the signature sound of a cumbia record played at the wrong speed
    2. **Vinyl Wow and Flutter** – the slow, hypnotic pitch variations of a warped or uneven record
    3. **Sonidero Shouts** – the live, reverb-drenched shout-outs and greetings from the DJ
    4. **Accordion Glue** – the sound of the Colombian accordion, slowed down to a melancholic breathing
    5. **Güiro Scrape** – the rhythmic, percussive scrape of the güiro, now a slow, textural drag
    # Light/Color (Sound Analogs)
    6. **Syrupy Slow-Motion** – a sound that feels thick, viscous, and moves like molasses
    7. **Dusty Dancefloor** – the sound of a well-worn outdoor dancefloor in Monterrey or Mexico City
    8. **Psychedelic Haze** – a disorienting, hallucinatory quality created by the slow speed
    9. **Beer-Sign Neon** – the warm, slightly flickering glow of a bar's neon sign
    10. **Late-Night Melancholy** – a feeling of sadness and nostalgia that emerges from the slowed-down joy of the original song
    # Philosophy/Process
    11. **Accidental Genius** – the genre was supposedly born from an accident, a malfunctioning turntable
    12. **The DJ as an Instrument** – the sonidero is not just playing records, they are performing them with their voice and gear
    13. **Transnational Dialogue** – a conversation between Colombian music and the Mexican communities that adopted and transformed it
    14. **Emotional Re-Contextualization** – slowing down a song to reveal a hidden layer of sadness
    15. **Bodily Memory** – a tempo that is less for frantic dancing and more for a slow, hypnotic sway

    ## Concept Panel:
    1. **Andrés Landero** – legendary Colombian accordionist and cumbia pioneer, whose records are the source material
    2. **DJ Screw** – creator of the “Chopped and Screwed” style in Houston hip-hop, a parallel tradition of slowing down music to create a new feeling
    3. **Augustus Pablo** – Jamaican dub producer, a master of using studio effects and reverb to create a sense of space and disorientation
    4. **Gabriel García Márquez** – Colombian author whose magical realism has a similar quality of a familiar world made strange and dreamlike
    5. **Ramón Rojo** – legendary sonidero of Sonido La Changa, a key figure in Mexico City's sound system culture
    6. **Carlos Vives (Devil's Advocate)** – Colombian pop star who has built a career on speeding up and modernizing traditional vallenato and cumbia, and would argue for a more upbeat and commercial approach.

    ## Medium Panel:
    1. **Celso Piña** – the “rebel of the accordion” from Monterrey, who fused cumbia with many other genres
    2. **Toy Selectah** – member of Control Machete and a producer who has been a key figure in the global dissemination of Mexican electronic music
    3. **Erick Rincón (3Ball MTY)** – producer of tribal guarachero, a different, much faster and more frantic evolution of Mexican street music
    4. **Sonido Dueñez** – the brothers from Monterrey credited with accidentally inventing cumbia rebajada
    5. **Instituto Mexicano del Sonido (Camilo Lara)** – artist who often uses cumbia samples in a quirky, postmodern collage style
    6. **Diplo (Devil's Advocate)** – a DJ and producer known for his fast-paced, high-energy global bass music, who would likely want to speed everything up and add a huge drop, missing the point of the rebajada style.

    ## Context & Marketing Panel:
    1. **The Sonidero Sound System Culture of Mexico City** – the cultural context of live DJs, shout-outs, and community dances
    2. **Vice News / Noisey** – media outlets that have produced documentaries on sonidero and rebajada culture
    3. **Boiler Room** – streaming platform that has hosted sonidero sets
    4. **The Lowrider Community** – a subculture in both the US and Mexico that shares an aesthetic of “low and slow”
    5. **ZZK Records** – an Argentine record label that has championed the digital evolution of cumbia
    6. **Spotify “Cumbias Viejitas” Playlist Curator (Devil’s Advocate)** – a curator focused on the original, upbeat tempo of cumbia, who would represent the mainstream taste that rebajada subverts.

