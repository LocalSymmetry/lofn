- name: Hauntological Soundscapers
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Vinyl Crackle Bed** – the warm hiss of a dusty record as a foundational texture
    2. **Tape Hiss** – the subtle, nostalgic noise floor of cassette tapes
    3. **Public Information Film Samples** – snippets of eerie, authoritative voices from old government films
    4. **Mellotron Flutes** – the wobbly, breathy sound of tape-replay keyboards
    5. **Numbers Station Vocals** – cryptic, disembodied voices reading sequences of numbers
    # Light/Color (Sound Analogs)
    6. **Faded Radiophonics** – sounds that feel like a sun-bleached photograph from the 1970s
    7. **Sepia-Toned Reverb** – reverb that gives a sense of dusty, abandoned spaces
    8. **Cathode Ray Hum** – the low, constant hum of an old television set
    9. **Warped TV Startup Chime** – a familiar, optimistic sound made strange and melancholic
    10. **School-Room Projector Fan** – the whirring, mechanical sound of educational technology
    # Philosophy/Process
    11. **Nostalgia for Lost Futures** – a yearning for the futures imagined in the past that never came to be
    12. **The Persistence of Memory** – how old media formats haunt our digital present
    13. **Cultural Amnesia** – music that sounds like a half-remembered dream of a collective past
    14. **Sonic Séance** – attempting to contact the ghosts of past media
    15. **The Creeping Invasion of the Past** – a subtle sense of dread that the past is not truly gone

    ## Concept Panel:
    1. **Mark Fisher** – cultural theorist who extensively wrote about and defined hauntology
    2. **Jacques Derrida** – philosopher whose concept of hauntology (a pun on ontology) is the origin point
    3. **Adam Curtis** – documentary filmmaker whose work is a masterclass in hauntological collage
    4. **The BBC Radiophonic Workshop (collective)** – creators of the uncanny sounds for shows like *Doctor Who*
    5. **Oliver Postgate** – creator of eerie, nostalgic children's shows like *Bagpuss* and *The Clangers*
    6. **Donna Summer (Devil's Advocate)** – queen of disco whose music represents a forward-looking, utopian, and relentlessly present-tense dancefloor futurism, the opposite of hauntological melancholy.

    ## Medium Panel:
    1. **Boards of Canada** – Scottish electronic duo, the quintessential hauntological artists
    2. **The Caretaker (Leyland Kirby)** – artist whose work explores memory and dementia through decaying ballroom music
    3. **Burial** – electronic producer whose music sounds like the ghost of UK garage and rave culture
    4. **Pye Corner Audio** – project that creates imaginary soundtracks for unseen 1970s sci-fi films
    5. **Broadcast** – indie band whose sound fused 1960s psych-pop with eerie electronics
    6. **Philip Glass (Devil's Advocate)** – minimalist composer whose work is about structure, process, and the present moment of performance, not cultural memory or found sound.

    ## Context & Marketing Panel:
    1. **Simon Reynolds** – music critic whose book *Retromania* explores our obsession with the past
    2. **Ghost Box Records (Jim Jupp & Julian House)** – record label and design studio that created a unified hauntological aesthetic
    3. **Scarfolk Council (Richard Littler)** – a satirical blog that imagines a perpetually nightmarish 1970s English town
    4. **Look Around You (Peter Serafinowicz & Robert Popper)** – creators of a pitch-perfect parody of 1970s/80s educational TV
    5. **Jonny Trunk** – founder of Trunk Records, dedicated to unearthing library music and obscure soundtracks
    6. **Fredric Jameson (Devil’s Advocate)** – Marxist theorist who would argue that hauntology is merely another symptom of the “waning of affect” in late capitalism, a postmodern nostalgia that prevents true historical consciousness.

