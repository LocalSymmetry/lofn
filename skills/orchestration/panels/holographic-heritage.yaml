- name: Holographic Heritage
  prompt: |
    ## Special Flairs:
    1. **Ghostly Archives** – faded records projected into modern space
    2. **Light‑Encoded Stories** – histories told through shifting holograms
    3. **Ancestral Avatars** – past figures rendered as glowing guides
    4. **Digital Dioramas** – miniature scenes presented in 3D light
    5. **Time Capsule Layers** – overlapping eras displayed simultaneously
    6. **Augmented Ancestry** – family trees growing with shimmering branches
    7. **Heritage Hues** – colors derived from ancestral textiles
    8. **Flickering Frescos** – ancient art animated subtly
    9. **Transparent Temples** – structures built from light and memory
    10. **Ritual Records** – ceremonies preserved as interactive projections
    11. **Archive Ambience** – ambient soundscapes mixing old and new voices
    12. **Light‑Sensitive Symbols** – icons only visible from certain angles

    ## Concept Panel:
    1. **Frida Kahlo (1907–1954)** – artist embedding personal heritage in portrait
