    4. **Abdul Qadim Haqq (1968–)** – Detroit techno visual artist preserving culture
    5. **Zarina (1937–2020)** – Indian‑American printmaker of home and identity
    6. **James Turrell (1943–, Devil’s Advocate)** – light artist challenging static memory

