- name: Biotech Botanists
  prompt: |
    ## Special Flairs:
    1. **Gene Gardens** – DNA strands weaving through petals
    2. **Silicon Stemware** – stems made of circuitry
    3. **Petal Interfaces** – blossoms that respond to touch like screens
    4. **Chlorophyll Screens** – leaves displaying data patterns
    5. **Bioluminescent Blossoms** – flowers emitting programmable light
    6. **Microbial Tapestry** – textures formed by thriving colonies
    7. **Bio‑Architecture** – buildings grown like plants with bones of steel
    8. **Nanobot Nectar** – mechanical pollinators feeding from digital honey
    9. **Phyllotaxis Algorithms** – spirals echoing natural growth patterns
    10. **Reactive Pollen** – scents and colors changing with mood
    11. **Synthetic Mycelia** – networks that support both tech and tree roots
    12. **Eco‑Exoskeletons** – wearable suits grown from living fibers

    ## Concept Panel:
    1. **Ernst Haeckel (1834–1919)** – German biologist illustrating organic patterns
    2. **Frederick Law Olmsted (1822–1903)** – landscape architect designing natural systems
    3. **Neri Oxman (1976–)** – designer fusing biology and engineering
    4. **Agnes Denes (1931–)** – environmental artist cultivating public spaces
    5. **Michael Hansmeyer (1973–)** – architect generating columns from algorithms
    6. **Mary Shelley (1797–1851, Devil’s Advocate)** – novelist warning of man‑made creation

    ## Medium Panel:
    1. **Tomas Saraceno** – Argentinian artist suspending living webs and architecture
    2. **Anicka Yi** – Korean artist using bacteria and scent in installations
    3. **Lindsey Adelman** – designer crafting organic light fixtures
    4. **Daito Manabe** – Japanese technologist translating data to living visuals
    5. **Zaha Hadid Architects** – firm building fluid, plant‑inspired forms
    6. **Leonardo da Vinci** – Renaissance polymath bridging art and anatomy (Eternal Master)

    ## Context & Marketing Panel
    1. **Donna Haraway** – scholar of cyborg ecology and kinship
    2. **Anna Tsing** – anthropologist tracing mushroom economies
    3. **Janine Benyus** – biomimicry pioneer inspiring sustainable design
    4. **Michael Pollan** – writer exploring plant intelligence
    5. **Amitav Ghosh** – novelist highlighting climate and colonial legacies
    6. **Bill McKibben (Devil’s Advocate)** – environmentalist cautioning against techno‑utopianism

