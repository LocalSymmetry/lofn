- name: Third-Stream Composers
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Cool Jazz Saxophone** – the relaxed, lyrical, and intellectual sound of a West Coast jazz saxophone
    2. **String Quartet Counterpoint** – the intricate, weaving lines of a classical string section
    3. **Walking Bass (pizzicato)** – a jazz bass line played with the fingers, not a bow
    4. **Fugue Form** – a classical structure of imitation and repetition, applied to jazz themes
    5. **Orchestral Percussion** – using instruments like timpani and concert bass drums in a jazz context
    # Light/Color (Sound Analogs)
    6. **Black and White Cinema** – a sound that is sophisticated, dramatic, and has the feel of a classic noir film
    7. **Smoky Concert Hall** – the acoustics and atmosphere of a formal concert hall, but with the intimacy of a jazz club
    8. **Bauhaus Lines** – clean, clear, and well-defined musical lines and structures
    9. **Manhattan Skyline** – a sound that is urbane, ambitious, and has a sense of verticality
    10. **Cool Blue** – a sonic palette that is calm, intellectual, and melancholic
    # Philosophy/Process
    11. **Synthesis, not Juxtaposition** – the goal is to truly fuse jazz and classical, not just alternate between them
    12. **Improvisation within a Structure** – allowing for jazz-style improvisation within a tightly composed classical framework
    13. **High Art / Low Art Collapse** – rejecting the traditional cultural hierarchy that places classical music above jazz
    14. **The Composer as Improviser** – a belief that composition is a slow form of improvisation
    15. **Formal Elegance** – a focus on balance, structure, and clarity

    ## Concept Panel:
    1. **Gunther Schuller** – composer and horn player who coined the term \"Third Stream\"
    2. **John Lewis** – pianist and musical director of the Modern Jazz Quartet
    3. **Béla Bartók** – composer who famously integrated folk music traditions into his classical compositions
    4. **Miles Davis** – particularly his work with Gil Evans on albums like *Sketches of Spain*
    5. **Igor Stravinsky** – composer whose rhythmic complexity and use of dissonance was influential on jazz artists
    6. **Ornette Coleman (Devil's Advocate)** – free jazz pioneer whose work rejected preset chordal structures and forms, and who would argue that Third Stream was a conservative attempt to make jazz respectable to a classical audience.

    ## Medium Panel:
    1. **The Modern Jazz Quartet** – the quintessential Third Stream group, known for their elegant, chamber-jazz sound
    2. **Charles Mingus** – bassist and composer whose work often incorporated complex classical structures
    3. **Stan Getz** – saxophonist whose work with arrangers like Eddie Sauter explored the fusion of jazz and strings
    4. **Jimmy Giuffre** – clarinetist and composer known for his quiet, conversational, and highly arranged form of chamber jazz
    5. **George Russell** – jazz composer and theorist whose *Lydian Chromatic Concept* provided a new theoretical framework for improvisation
    6. **John Coltrane (Devil's Advocate)** – saxophonist whose later work moved into spiritual and modal jazz, a form of freedom and expression that was less concerned with formal European structures and more with transcendence.

    ## Context & Marketing Panel:
    1. **The Lenox School of Jazz** – a summer program in the late 50s where many of these ideas were developed
    2. **Atlantic Records / Verve Records** – labels that released many key Third Stream recordings
    3. **The Monterey Jazz Festival** – a venue that often showcased ambitious, large-scale jazz compositions
    4. **Film Noir Soundtracks** – a genre where the fusion of jazzy moods and orchestral suspense was common
    5. **Leonard Bernstein** – conductor and composer who championed the synthesis of American popular music and classical forms
    6. **Wynton Marsalis (Devil’s Advocate)** – a jazz purist who would argue that the tradition's strength lies in its connection to the blues and swing, and that Third Stream was a detour from its core identity.

