- name: Surreal Loop Weavers
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Seamless Loop** – the final frame is identical to the first, creating an infinite video
    2. **Digital Grain** – a subtle layer of noise that makes CGI feel more tangible
    3. **Impossible Materials** – objects made of smoke, water, or light
    4. **Jelly Physics** – objects that wobble and deform in a satisfying, gelatinous way
    5. **Kinetic Sand** – textures that crumble and reform in mesmerizing patterns
    # Light/Color
    6. **Pastel Gradients** – soft, dreamy, and satisfying color transitions
    7. **Soft-Focus Glow** – a gentle bloom effect that makes the scene feel like a dream
    8. **Refractive Caustics** – the beautiful, dancing patterns of light through glass or water
    9. **Iridescent Sheen** – surfaces that shimmer with a rainbow of colors
    10. **Monochromatic Mood** – using a single color to create a powerful, unified feeling
    # Philosophy/Process
    11. **Oddly Satisfying** – the core principle of creating visuals that trigger a pleasing, almost ASMR-like response
    12. **Micro-Narrative** – telling a tiny, self-contained story that resets with each loop
    13. **The Physics of the Impossible** – creating a consistent, believable set of physical laws for an impossible world
    14. **Digital Zen Garden** – a loop that is calming and meditative to watch
    15. **Expectation Subversion** – setting up a pattern and then breaking it in a surprising, satisfying way

    ## Concept Panel:
    1. **M.C. Escher** – artist of impossible loops and mathematical tessellations
    2. **René Magritte** – surrealist painter whose work plays with logic and expectation
    3. **Busby Berkeley** – choreographer known for his kaleidoscopic, geometric dance numbers
    4. **Adam Savage** – maker and special effects designer obsessed with process and problem-solving
    5. **OK Go (the band)** – masters of the single-take, Rube Goldberg-style music video
    6. **John Cage (Devil's Advocate)** – experimental composer who would introduce the element of chance, randomness, and imperfection to disrupt the perfect, satisfying loop.

    ## Medium Panel:
    1. **Andreas Wannerstedt** – a key 3D artist in the \"Oddly Satisfying\" space, known for his perfect loops
    2. **Beeple (Mike Winkelmann)** – digital artist whose daily renders often feature surreal, looping animations
    3. **Extraweg** – creative studio known for its playful, surreal, and tactile animations
    4. **Lucas Zanotto** – designer and director creating playful, physics-based videos
    5. **Houdini (software)** – the 3D animation software most associated with complex physical simulations
    6. **Don't Hug Me I'm Scared (Creators) (Devil's Advocate)** – filmmakers who use a cute, satisfying aesthetic to build a sense of creeping dread, and would argue for subverting satisfaction into horror.

    ## Context & Marketing Panel:
    1. **r/oddlysatisfying (Reddit community)** – the nexus of the satisfying content trend
    2. **Instagram's algorithm** – which rewards short, re-watchable, visually appealing loops
    3. **Adult Swim bumps** – the short, surreal, and often looping animations between shows
    4. **The Slow Mo Guys** – YouTubers who reveal the satisfying physics hidden in everyday events
    5. **Lofi Girl (YouTube channel)** – a channel that demonstrates the power of a single, calming, infinite loop
    6. **Dr. Richard Thaler (Devil’s Advocate)** – behavioral economist and nudge theorist who would analyze and deconstruct the cognitive biases that make these loops so “satisfying,” potentially stripping them of their magic.

