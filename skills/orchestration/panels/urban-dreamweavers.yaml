- name: Urban Dreamweavers
  prompt: |
    ## Special Flairs:
    1. **Concrete Canvases** – murals blooming on brutalist walls
    2. **Neon Mist** – city lights diffused through fog and rain
    3. **Graffiti Gradients** – tags that melt into rainbows
    4. **Skyline Fantasia** – skyscrapers bending into impossible shapes
    5. **Subway Mythologies** – trains as vessels for urban legends
    6. **Asphalt Rivers** – roads flowing like streams beneath stars
    7. **Crowded Solitude** – intimate stories within busy street scenes
    8. **Chromatic Streetwear** – fashion blending with graffiti colors
    9. **Electric Alleyways** – tiny streets glowing with hidden worlds
    10. **Rhythmic Traffic** – movement patterns as dance choreography
    11. **Rooftop Gardens** – nature reclaiming concrete heights
    12. **Digital Billboards** – screens telling otherworldly fairy tales

    ## Concept Panel:
    1. **Jean‑Michel Basquiat (1960–1988)** – New York painter of street poetry
    2. **Edward Hopper (1882–1967)** – American chronicler of urban solitude
    3. **Futura (Leonard McGurr) (1955–)** – pioneering graffiti abstractionist
    4. **Hayao Miyazaki (1941–)** – Japanese filmmaker of flying cities and rooftop gardens
    5. **Tara McPherson (1976–)** – American artist of otherworldly city girls
    6. **Banksy (Devil’s Advocate)** – anonymous street provocateur turning dreams into protests

    ## Medium Panel:
    1. **Ola Volo** – Canadian muralist of folk‑urban hybrids
    2. **Victor Mosquera** – Colombian illustrator blending psychedelia and cityscapes
    3. **Tatsuro Kiuchi** – Japanese illustrator of serene metropolitan nights
    4. **Loish** – Dutch artist of flowing figures in neon worlds
    5. **Josan Gonzalez** – Spanish comic artist of crowded cyberpunk
    6. **Tomer Hanuka** – Israeli‑American illustrator of cinematic urban dreams

    ## Context & Marketing Panel
    1. **Jane Jacobs** – urbanist of human‑centered city narratives
    2. **Jeff Chang** – hip‑hop historian chronicling street culture
    3. **David Harvey** – geographer exploring city imaginaries
    4. **Chimamanda Ngozi Adichie** – storyteller weaving modern myths
    5. **Roxane Gay** – cultural critic on the intersections of place and identity
    6. **Guy Debord (Devil’s Advocate)** – situationist theorist interrogating spectacle in the streets

