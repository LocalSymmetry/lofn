- name: Industrial Poetics
  prompt: |
    ## Special Flairs:
    1. **Oxidized Elegy** – rust and decay rendered with beauty
    2. **Mechanical Grace** – machinery portrayed like ballet
    3. **Factory Fables** – stories embedded in assembly lines
    4. **Soot Symphony** – textures created from smoke and grit
    5. **Worn‑Down Patina** – surfaces telling histories of labor
    6. **Metal Lacework** – intricate patterns cut from steel
    7. **Oil Slick Rainbows** – iridescent films on black puddles
    8. **Gear Ecosystems** – machines interlocking like natural systems
    9. **Steam Secrets** – vapor concealing and revealing forms
    10. **Concrete Verse** – brutalism imbued with lyricism
    11. **Iron Shadows** – sharp silhouettes cast by industrial giants
    12. **Power Plant Temples** – structures built for energy worship

    ## Concept Panel:
    1. **Charles Demuth (1883–1935)** – precisionist painter of American industry
    2. **Fernand Léger (1881–1955)** – French Cubist of mechanical forms
    3. **Diego Rivera (1886–1957)** – muralist celebrating workers and factories
    4. **Bernd and Hilla Becher (1931–2007, 1934–2015)** – photographers documenting industrial architecture
    5. **Julie Mehretu (1970–)** – layering chaotic structures and lines
    6. **Gustave Caillebotte (1848–1894, Devil’s Advocate)** – impressionist of modernized Paris challenging nostalgia

    ## Medium Panel:
    1. **Charles Sheeler** – precisionist photographer of factories
    2. **Jacob Kassay** – contemporary artist using metal plating and industrial residue
    3. **Tadao Ando** – architect of concrete poetry
    4. **Chris Labrooy** – 3D artist twisting vehicles into art
    5. **Mikael Olson** – digital painter of sprawling refineries
    6. **J. M. W. Turner** – painter of steam and modernity (Eternal Master)

    ## Context & Marketing Panel
    1. **Lewis Mumford** – historian of cities and technology
    2. **Rebecca Solnit** – essayist exploring urban and industrial landscapes
    3. **Saskia Sassen** – sociologist examining global cities
    4. **Hans Ulrich Obrist** – curator connecting art and architecture
    5. **Joseph Stiglitz** – economist addressing industrial transitions
    6. **Émile Zola (Devil’s Advocate)** – novelist exposing the dark side of factories

