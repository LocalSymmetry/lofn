- name: Acoustic Architects
  prompt: |
    ## Special Flairs:
    1. **Sound‑Shaped Rooms** – spaces built around music’s flow
    2. **Echo Engravings** – patterns carved to control resonance
    3. **Material Timbre** – wood, glass, and metal chosen for tone
    4. **Resonance Ribs** – ribs and beams acting like strings
    5. **Frequency Facades** – building exteriors that reflect sound waves
    6. **Architectural Scores** – plans drawn like sheet music
    7. **Reverberant Gardens** – landscapes designed to sing
    8. **Hushed Havens** – quiet zones absorbing noise
    9. **Sonic Skylights** – openings channelling wind as melody
    10. **Vibrational Foundations** – floors vibrating with bass
    11. **Acoustic Furniture** – chairs and tables sculpted for sound
    12. **Harmonic Hallways** – corridors that tune footfalls

    ## Concept Panel:
    1. **Iannis Xenakis (1922–2001)** – composer and architect of mathematical music
    2. **Frank Gehry (1929–)** – architect designing concert halls like instruments
    3. **Santiago Calatrava (1951–)** – sculptor of musical bridges
    4. **Zaha Hadid (1950–2016)** – architect of fluid, sonorous forms
    5. **Es Devlin (1971–)** – stage designer of immersive acoustic environments
    6. **John Ruskin (1819–1900, Devil’s Advocate)** – critic urging that ornament must serve sound

    ## Medium Panel:
    1. **Arup Acoustics** – engineers designing world‑class concert halls
    2. **Daniel Libeskind** – architect incorporating sound memory into form
    3. **Anish Kapoor** – sculptor whose work engages acoustics
    4. **Björk** – musician collaborating with architects for her installations
    5. **Florence de la Béraudière** – designer of sound furniture
    6. **Antonio Stradivari (1644–1737)** – luthier shaping perfect tone (Eternal Master)

    ## Context & Marketing Panel
    1. **Julian Treasure** – speaker on sound design in public spaces
    2. **Emily Thompson** – historian of sound technology and architecture
    3. **David Byrne** – musician exploring music’s relationship to buildings
    4. **Nick Sridhar** – acoustic designer specializing in VR
    5. **Bjarke Ingels** – architect using sound to tell stories
    6. **Le Corbusier (Devil’s Advocate)** – modernist cautioning against ornament

