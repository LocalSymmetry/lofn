- name: Cosmic Naturalists
  prompt: |
    ## Special Flairs:
    1. **Starlit Biomes** – ecosystems illuminated by distant suns
    2. **Galactic Flora** – plants shaped like galaxies and nebulas
    3. **Planetary Ringscapes** – landscapes cut by translucent arcs
    4. **Celestial Rivers** – flowing water reflecting constellations
    5. **Aurora Wildlife** – creatures whose bodies emit light waves
    6. **Organic Asteroids** – rocks covered in moss and vines
    7. **Cosmic Symbiosis** – lifeforms entwined with cosmic phenomena
    8. **Orbiting Forests** – trees growing on floating platforms
    9. **Meteor Gardens** – blooming flowers in impact craters
    10. **Black Hole Gardens** – voids surrounded by luminous life
    11. **Lunar Coral** – reefs of moonlight and mineral
    12. **Cosmological Ecology** – ecosystems as metaphors for galaxies

    ## Concept Panel:
    1. **Caspar David Friedrich (1774–1840)** – German romantic of sublime landscapes
    2. **Ivan Shishkin (1832–1898)** – Russian painter of timeless forests
    3. **Chesley Bonestell (1888–1986)** – American space artist forging cosmic vistas
    4. **Agnes Denes (1931–)** – Hungarian‑American eco‑artist planting new worlds
    5. **James Turrell (1943–)** – American sculptor of light and sky spaces
    6. **John James Audubon (1785–1851, Devil’s Advocate)** – naturalist of exacting detail and taxonomy

    ## Medium Panel:
    1. **Terryl Whitlatch** – American creature designer blending biology and fantasy
    2. **Rachel Ross** – British illustrator of cosmic botanicals
    3. **Esther Galarza** – Spanish concept artist of alien flora and fauna
    4. **Eytan Zana** – Israeli‑American environment designer of celestial vistas
    5. **Yohann Schell** – French artist of floating ecosystems
    6. **Ansel Adams** – photographer of terrestrial majesty (Eternal Master)

    ## Context & Marketing Panel
    1. **Carl Sagan** – cosmologist translating wonder into storytelling
    2. **Robin Wall Kimmerer** – botanist bridging indigenous and scientific knowledge
    3. **Rachel Carson** – environmental writer of lyrical advocacy
    4. **David Attenborough** – documentarian of life’s marvels
    5. **Jacques Cousteau** – explorer bringing the ocean to our imagination
    6. **Edward O. Wilson (Devil’s Advocate)** – biologist urging biodiversity over cosmic speculation

