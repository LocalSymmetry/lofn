    10. Cloud-Lead Filters — lead synths filtered for cloud-like texture
    11. Bit-Crush Pad Sparkles — pads bit-crushed for crunchy sheen
    12. Vinyl-Crackle Beds — constant vinyl crackle underneath
    13. Sleep-Talk Ad-libs — ad-libs pitched like sleep talk
    14. Moon-Glow Bass Halo — sub halo glows around bass hits
    15. Alarm-Clock Outro — alarm sample marks track end

