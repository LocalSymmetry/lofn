- name: New Weird Americana Troubadours
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Creaking Porch Swing Rhythm** – percussion that mimics the gentle, unsettling rhythm of a porch swing
    2. **Finger-Plucked, Warped Acoustic Guitar** – intricate folk guitar playing that sounds slightly out of tune or melted
    3. **Circuit-Bent Children's Toys** – the distorted, demonic sounds of repurposed electronic toys
    4. **Whispered, Multi-Tracked Vocals** – layered, close-mic'd vocals that create a ghostly choir
    5. **Found-Sound Foliage** – rhythms made from rustling leaves, snapping twigs, and bird calls
    # Light/Color (Sound Analogs)
    6. **Dusty Attic Sunbeam** – a sound that feels like a single shaft of light in a dark, forgotten space
    7. **Swampy Reverb** – a thick, humid reverb that feels organic and murky
    8. **Faded Kodachrome Harmonies** – vocal harmonies that have the warm, slightly off-kilter color of old photographs
    9. **Firefly Synths** – gentle, blinking synthesizer notes that appear and disappear
    10. **Southern-Gothic Shadow** – a sense of darkness and history that looms over even the prettiest melodies
    # Philosophy/Process
    11. **Psychedelic Pastoralism** – celebrating nature while also imbuing it with a sense of strange, hallucinatory power
    12. **The Old, Weird America** – channeling the strange, violent, and mystical undercurrents of American folk traditions
    13. **Lo-Fi Intimacy** – using simple, imperfect recording methods to create a feeling of closeness
    14. **Free Folk** – a rejection of traditional song structures in favor of sprawling, associative compositions
    15. **Handmade Modernism** – using avant-garde techniques within a seemingly traditional, rustic framework

    ## Concept Panel:
    1. **Greil Marcus** – music journalist who coined the phrase \"The Old, Weird America\" in his book *Invisible Republic*
    2. **Harry Smith** – compiler of the *Anthology of American Folk Music*, the source code for the movement
    3. **Henry Darger** – outsider artist whose work has a similar mix of innocence, darkness, and obsessive world-building
    4. **Karen Dalton** – folk singer with a raw, unique, and haunting voice
    5. **The Carter Family** – the first family of country music, representing the traditional source material
    6. **Alan Lomax (Devil's Advocate)** – folklorist and purist who would likely object to the psychedelic and avant-garde liberties taken with the traditional forms he sought to preserve.

    ## Medium Panel:
    1. **Devendra Banhart** – a key figure in the 2000s New Weird America movement
    2. **Joanna Newsom** – harpist and songwriter known for her complex, poetic, and idiosyncratic songs
    3. **Animal Collective** – band that blends electronic noise, folk harmonies, and psychedelic pop
    4. **Akron/Family** – experimental folk-rock band that embraced a communal, free-form ethos
    5. **Sufjan Stevens** – songwriter whose work often blends folk intimacy with grand, orchestral arrangements and historical themes
    6. **John Fahey (Devil's Advocate)** – pioneering American Primitive guitarist whose work was deeply traditional yet experimental, and who would likely have a cynical, purist's critique of the genre's more whimsical or 'hippie' tendencies.

    ## Context & Marketing Panel:
    1. **The Wire (magazine)** – UK music magazine that was an early champion and theorist of the genre
    2. **Arthur (magazine)** – a free, counter-cultural magazine from the 2000s that was central to the scene
    3. **Pitchfork** – influential music website that heavily covered and promoted New Weird America artists
    4. **Kill Rock Stars / Drag City** – independent record labels that released many key albums of the genre
    5. **Etsy** – an online marketplace whose aesthetic of handmade, rustic modernism aligns with the genre
    6. **The Grand Ole Opry (Devil’s Advocate)** – the institution of mainstream country music, which would represent the traditional, conservative, and commercial values that New Weird America defines itself against.

