- name: Data Mythicians
  prompt: |
    ## Special Flairs:
    1. **Algorithmic Allegory** – code as metaphor for timeless tales
    2. **Statistical Spirits** – data points anthropomorphized
    3. **CSV Cosmology** – spreadsheets arranged like constellations
    4. **Graphical Glyphs** – charts doubling as ancient runes
    5. **Database Dreams** – tables structured like genealogies
    6. **Binary Beasts** – ones and zeros become characters
    7. **Quantified Quests** – narratives built from quantified steps
    8. **Hyperlink Histories** – lore traveling through networks
    9. **Normalized Narratives** – tidy data telling messy stories
    10. **API Prophecies** – endpoints foretelling actions
    11. **Visualization Vistas** – vistas that decode complex worlds
    12. **Meta Myths** – stories about the stories we tell with data

    ## Concept Panel:
    1. **William Playfair (1759–1823)** – inventor of statistical graphics
    2. **Florence Nightingale (1820–1910)** – pioneer of data visualization
    3. **Ben Shneiderman (1947–)** – human‑computer interaction pioneer
    4. **Mina Loi (1983–)** – graphic designer merging science and myth
    5. **Jer Thorp (1975–)** – data artist turning numbers into stories
    6. **George R. R. Martin (1948–, Devil’s Advocate)** – novelist reminding that data doesn’t contain dragons

    ## Medium Panel:
    1. **Fernanda Viégas** – information designer of fluid visuals
    2. **Manuel Lima** – mapping networks and genealogies
    3. **Nadieh Bremer** – data artist creating narrative charts
    4. **Federica Fragapane** – Italian designer of human‑centered infographics
    5. **Shore St. Clare** – generative artist fusing code and myth
    6. **Edward Tufte** – statistician of clarity and truth (Eternal Master)

    ## Context & Marketing Panel
    1. **Cathy O’Neil** – data scientist warning of algorithmic bias
    2. **Hans Rosling** – doctor using data to tell hopeful stories
    3. **Databites (initiative)** – group exploring data storytelling
    4. **Kate Crawford** – researcher of AI politics and power
    5. **Jorge Arango** – information architect championing clarity
    6. **Yuval Noah Harari (Devil’s Advocate)** – historian cautioning against data determinism

