- name: Bio-Art Symbionts
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Mycelial Scaffolding** – structures grown from fungal networks
    2. **Kombucha Leather** – flexible, translucent skin grown from bacteria
    3. **Living Ink** – pigments derived from bioluminescent algae
    4. **Crystalline Chrysalis** – forms encased in grown salt or sugar crystals
    5. **Slime Mold Circuits** – organic, self-organizing electronic pathways
    # Light/Color
    6. **Bacterial Chroma** – iridescent sheens created by microbial colonies
    7. **Photosynthetic Glow** – soft, green light emitted by living matter
    8. **Fermentation Hues** – deep, earthy colors from metabolic processes
    9. **Agar Transparency** – the ghostly, semi-opaque quality of nutrient jelly
    10. **Foxfire Aura** – the faint, blue-green light of decaying wood fungi
    # Philosophy/Process
    11. **Interspecies Collaboration** – art made *with*, not just *of*, other organisms
    12. **Controlled Decay** – aesthetics of decomposition and renewal
    13. **Metabolic Time** – pacing determined by the speed of life and growth
    14. **Non-Human Agency** – embracing the unpredictable creativity of nature
    15. **Lab-as-Studio** – the sterile aesthetics of the laboratory as a creative space

    ## Concept Panel:
    1. **Neri Oxman** – architect and designer materializing biology and data
    2. **Alexandra Daisy Ginsberg** – artist exploring synthetic biology and the non-human
    3. **Eduardo Kac** – bio-artist known for transgenic works like the GFP Bunny
    4. **Jae Rhim Lee** – creator of the Infinity Burial Suit (mushroom death suit)
    5. **Ernst Haeckel** – 19th-century biologist whose drawings revealed nature's alien forms
    6. **Dr. Ian Malcolm (fictional, Devil's Advocate)** – chaos theorist relentlessly questioning the ethics and unforeseen consequences of “playing God”

    ## Medium Panel:
    1. **Anicka Yi** – conceptual artist using bacteria, scents, and tempura batter
    2. **Heather Barnett** – artist working with slime molds to explore collective intelligence
    3. **Suzanne Anker** – bio-art pioneer working with petri dishes and chromosomal landscapes
    4. **TINKEBELL.** – controversial Dutch artist using animal materials to question ethics
    5. **Philip Ross** – artist and mycologist who builds structures from reishi mushrooms
    6. **Damien Hirst (Devil's Advocate)** – conceptual artist whose use of dead animals would be challenged as spectacular, non-generative, and anti-symbiotic

    ## Context & Marketing Panel:
    1. **Dr. Donna Haraway** – philosopher of cyborgs and companion species
    2. **Dr. Anna Tsing** – anthropologist who follows fungal supply chains and feral ecologies
    3. **Michael Pollan** – author exploring the human relationship with plants and fungi
    4. **TeamLab** – art collective creating immersive digital ecosystems
    5. **The Eden Project** – curators of the world's largest indoor rainforest
    6. **Dr. Vandana Shiva (Devil’s Advocate)** – eco-feminist and activist who would critique the potential for corporate capture and patenting of life inherent in bio-art.

