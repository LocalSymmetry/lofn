- name: Kinetic Typography Poets
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Digital Ink Bleed** – letterforms that seem to bleed and blur as if on paper
    2. **Kinetic Letterpress** – text that has the deep, tactile impression of a letterpress
    3. **Glitching Text** – letters that flicker, stutter, and break apart like corrupted data
    4. **Animated Ligatures** – letters that connect and flow into each other in surprising ways
    5. **Text as a Physical Object** – words that have weight, bounce, and collide with each other
    # Light/Color
    6. **Textured Light** – light sources that seem to be made of text
    7. **Color-Coded Meaning** – using color to differentiate between voices, themes, or emotions
    8. **Subtle Gradients** – gentle shifts in color that guide the eye and create mood
    9. **High-Contrast Readability** – a focus on clear, legible text even amidst chaos
    10. **Shadow Play** – using drop shadows and perspective to give text a sense of place
    # Philosophy/Process
    11. **Visual Voice** – the motion of the text should match the cadence and emotion of the speaker
    12. **Pacing is Everything** – the speed at which words appear and disappear controls the entire meaning
    13. **The Swiss Grid (and breaking it)** – starting with a clear, organized grid and then intentionally violating it
    14. **Less is More** – using only typography to create a rich, emotional world
    15. **Sound-Driven Animation** – the animation is directly and precisely synced to a voiceover or music

    ## Concept Panel:
    1. **Saul Bass** – legendary graphic designer and filmmaker known for his kinetic title sequences
    2. **Guillaume Apollinaire** – poet who arranged words on the page to create images (calligrammes)
    3. **Jenny Holzer** – conceptual artist whose work consists primarily of text projected or displayed in public spaces
    4. **The Dadaists** – an early 20th-century art movement that played with typography and collage
    5. **Ira Glass** – radio host whose distinctive vocal pacing and storytelling is the perfect source material
    6. **Quentin Tarantino (Devil's Advocate)** – a filmmaker whose work is all about the power of spoken dialogue and performance, who would argue that animating the text distracts from the actors' delivery.

    ## Medium Panel:
    1. **MK12** – a design and filmmaking collective known for its intricate and witty kinetic typography
    2. **Johnny Harris** – journalist and YouTuber who uses kinetic typography to make complex topics engaging
    3. **Common Craft** – an explainer video company that pioneered a simple, accessible style
    4. **After Effects (software)** – the primary tool for creating kinetic typography
    5. **Variable Fonts** – a new font technology that allows for smooth animation between different weights and styles
    6. **Massimo Vignelli (Devil's Advocate)** – a legendary modernist designer who believed in strict, grid-based, and timeless typography, and would be horrified by the chaotic, expressive, and ephemeral nature of kinetic typography.

    ## Context & Marketing Panel:
    1. **The Rise of the Explainer Video** – a key driver of the demand for kinetic typography
    2. **Spoken-Word Poetry Slams** – a cultural scene that provides rich source material
    3. **TED Talks** – a platform that often uses animation and typography to illustrate ideas
    4. **Subtitled Foreign Media on TikTok** – the way that fast-paced, dynamic subtitles have become an aesthetic in themselves
    5. **The School of Motion** – an online school that has trained a generation of motion designers
    6. **Neville Brody (Devil’s Advocate)** – a graphic designer who would argue that much of kinetic typography prioritizes flashy animation over good, solid, and meaningful typographic principles.

