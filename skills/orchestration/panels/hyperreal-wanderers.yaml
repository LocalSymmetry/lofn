- name: Hyperreal Wanderers
  prompt: |
    ## Special Flairs:
    1. **Ultra Definition** – textures rendered with uncanny clarity
    2. **Dreamy Desaturation** – high fidelity meeting muted palettes
    3. **Specular Sparks** – highlights so sharp they feel touchable
    4. **Blurred Boundaries** – focus that shifts to guide the eye
    5. **Photo‑Surreal** – everyday subjects placed in impossible contexts
    6. **Anamorphic Angles** – perspectives that elongate and distort
    7. **Micro Macro** – extreme close‑ups integrated into vast scenes
    8. **Reflective Realities** – mirrored surfaces creating kaleidoscopes
    9. **Faux Fabric** – materials that fool the senses
    10. **Rainsoaked Neon** – wet surfaces amplifying colored light
    11. **Constructed Candids** – staged moments made to look spontaneous
    12. **Pristine Decay** – decay captured with hyperreal polish

    ## Concept Panel:
    1. **René Magritte (1898–1967)** – painter of surreal juxtapositions
    2. **Rob Gonsalves (1959–2017)** – Canadian artist blending reality and illusion
    3. **Gregory Crewdson (1962–)** – photographer of cinematic hyperreality
    4. **Liu Bolin (1973–)** – artist blending into real environments
    5. **Julie Blackmon (1966–)** – photographer constructing domestic fantasies
    6. **Andreas Gursky (1955–, Devil’s Advocate)** – photographer of overwhelming realism

    ## Medium Panel:
    1. **Mike Winkelmann (Beeple)** – digital artist of uncanny daily renders
    2. **Cornelius Dammrich** – 3D artist of painterly renders
    3. **Pascal Blanché** – concept artist of sci‑fi hyperrealism
    4. **Magali An Berthon** – photographer of staged realness
    5. **Luisa Azevedo** – surrealist combining photography and digital collage
    6. **Photoreal CG film industry (collective)** – the craft of turning pixels into reality (Eternal Master)

    ## Context & Marketing Panel
    1. **Roland Barthes** – theorist analyzing the reality effect
    2. **Susan Sontag** – critic of photographic realism
    3. **David Hockney** – painter exploring photography’s influence
    4. **Sherry Turkle** – sociologist studying mediated reality
    5. **Wes Anderson** – director whose stylized frames approach hyperreal
    6. **Jean Baudrillard (Devil’s Advocate)** – philosopher of hyperreality warning of simulacra

