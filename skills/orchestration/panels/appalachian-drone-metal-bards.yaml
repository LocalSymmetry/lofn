- name: Appalachian Drone-Metal Bards
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Distorted Banjo** – the bright twang of a banjo fed through a wall of fuzz pedals
    2. **Cigar-Box Guitar Drone** – the raw, buzzing hum of a homemade slide guitar
    3. **Cranked Tube-Amp Hum** – the warm, 60-cycle hum of an overdriven amplifier as an instrument
    4. **Mountain-Folk Field Recordings** – snippets of gospel singing or storytelling from archival recordings
    5. **Feedback as a Voice** – controlled amplifier feedback that sings a mournful, wordless melody
    # Light/Color (Sound Analogs)
    6. **Moonshine Haze** – a blurry, disorienting sonic quality, like looking through cheap liquor
    7. **Coal-Seam Black** – a sonic density that is heavy, dark, and suffocating
    8. **Sun-Rotten Porch** – a sound that feels old, wooden, and on the verge of collapse
    9. **Holler Reverb** – reverb that sounds like a shout echoing across a deep valley
    10. **Lamplight Warmth** – a low, warm, analog glow in the midst of crushing heaviness
    # Philosophy/Process
    11. **Electric Antiquarianism** – using modern, high-volume technology to excavate very old music
    12. **The Weight of History** – music that conveys the physical and psychological burden of a place
    13. **Sacred and Profane** – the fusion of hellfire-and-brimstone religion with godless, heavy drone
    14. **Generational Curse** – the feeling that the music is channeling long-standing traumas of poverty and place
    15. **Slow Time** – music that moves at the speed of geology, not human life

    ## Concept Panel:
    1. **Harry Smith** – compiler of the *Anthology of American Folk Music*, the foundational text
    2. **Cormac McCarthy** – novelist whose work captures the brutal, lyrical, and mythic quality of the region
    3. **Dock Boggs** – old-timey banjo player and singer whose songs were full of dread and violence
    4. **William Faulkner** – novelist whose stream-of-consciousness style mirrors the disorienting drone
    5. **Roscoe Holcomb** – singer of the “high, lonesome sound,” the embodiment of Appalachian pain
    6. **Dolly Parton (Devil's Advocate)** – a figure who has built a successful, optimistic, and forward-looking global brand out of her Appalachian roots, challenging the panel's focus on darkness and misery.

    ## Medium Panel:
    1. **Earth** – pioneering drone-metal band from Olympia, WA, led by Dylan Carlson
    2. **Sunn O)))** – drone-metal duo known for their extremely slow, loud, and physically intense performances
    3. **The Body** – experimental metal duo who constantly collaborate and defy genre
    4. **Steve Albini** – engineer known for his raw, minimalist recording techniques that capture the sound of a room
    5. **Alan Lomax** – folklorist and field-recorder whose work preserved the source material
    6. **T Bone Burnett (Devil's Advocate)** – producer known for his warm, clean, and nostalgic production on soundtracks like *O Brother, Where Art Thou?*, who would argue for clarity and accessibility over noise and abstraction.

    ## Context & Marketing Panel:
    1. **Southern Lord Records** – a key label for drone and experimental metal
    2. **Folkways Records** – the label that released Smith's *Anthology* and countless other historical recordings
    3. **The Oxford American (music issues)** – a magazine that champions deep, contextual storytelling about Southern music
    4. **David Berman (Silver Jews)** – poet and musician whose lyrics captured a similar sense of place and intellectual despair
    5. **Appalshop** – a media arts center in Kentucky dedicated to preserving Appalachian culture and stories
    6. **Ken Burns (Devil’s Advocate)** – documentary filmmaker whose approach to folk history is often seen as unifying and sentimental, and who would likely smooth over the genre's radical noise and darkness for a mainstream audience.

