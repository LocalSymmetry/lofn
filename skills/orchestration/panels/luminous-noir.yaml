- name: Luminous Noir
  prompt: |
    ## Special Flairs:
    1. **Shadow Luminescence** – darkness pierced by ethereal glows
    2. **Silhouette Stories** – narratives told through outlines
    3. **Reflected Mystery** – puddles and mirrors capturing secrets
    4. **Monochrome Spectrum** – subtle color within near‑black worlds
    5. **Gutter Glitter** – jewels hidden in rough places
    6. **Smoke Signals** – visual atmosphere thick with intrigue
    7. **Chromatic Shadows** – colored light emerging from darkness
    8. **Velvet Fog** – tactile mood swirling through scenes
    9. **Afterglow Echoes** – lingering light traces painting memory
    10. **Cinematic Corners** – compositions that feel like frames from a film
    11. **Neon Scripture** – street signs conveying cryptic wisdom
    12. **Polished Grit** – rough textures rendered with care

    ## Concept Panel:
    1. **Edward Hopper (1882–1967)** – master of lonely nocturnes
    2. **Film Noir cinematography (various)** – collective influence of shadow and light
    3. **Franz Kafka (1883–1924)** – writer of existential urban gloom
    4. **Noir Comics (e.g., Sin City)** – graphic storytelling of high contrast
    5. **Rinko Kawauchi (1972–)** – Japanese photographer of luminous everyday
    6. **Fritz Lang (1890–1976, Devil’s Advocate)** – filmmaker of Metropolis and moral labyrinths

    ## Medium Panel:
    1. **Masashi Kishimoto** – manga artist blending chiaroscuro and drama
    2. **Frank Miller** – comic artist famed for stark noir visuals
    3. **Fan Ho (1931–2016)** – Hong Kong photographer of poetic streets
    4. **Syd Mead (1933–2019)** – futurist designer of neon noir worlds
    5. **Hikari Shimoda** – Japanese painter combining cute with melancholy
    6. **Wong Kar‑wai** – filmmaker capturing mood and color (Eternal Master)

    ## Context & Marketing Panel
    1. **Jean Baudrillard** – philosopher of simulacra and neon cities
    2. **Laura Mulvey** – film theorist analyzing gaze and noir aesthetics
    3. **James Elroy** – crime novelist of gritty LA storytelling
    4. **Frank Oceans** – musician weaving cinematic noir moods
    5. **Janelle Monáe** – artist crafting dystopian neon narratives
    6. **Raymond Chandler (Devil’s Advocate)** – detective writer of cynical glamour

