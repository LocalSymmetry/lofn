    ## Special Flairs:
    1. Raw G-Rumble Kicks — distorted kick drums with guttural rumble
    2. Township Echo Claps — claps with long township-style delay
    3. Siren-Riser Slams — risers built from siren wails
    4. Empty-Space Reverb Hollows — sparse reverb for cavernous feel
    5. Tunnel-Talk Vox — vocal samples processed like tunnel echoes
    6. Gated-Snare Clicks — snare hits gated for staccato clarity
    7. Half-Time Smoke Pads — smoky pads at half the track tempo
    8. Taxi-Door Slaps — percussive hits like car doors closing
    9. Kettle-Drum Growl — bass tom samples growled via distortion
    10. Subterranean Sub-Drops — sub bass drops that feel underground
    11. Shuffle-Hat Ghosts — ghost-notes on shuffled hi-hats
    12. Power-Cut Breaks — sudden dropouts for tension
    13. Rumble-Roll Fills — rapid tom rolls with deep rumble
    14. Grit-Noise Sweeps — noise sweeps layered with grit
    15. Black-Out Ending Pulse — final pulsing silence break

