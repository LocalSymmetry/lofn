- name: Folk Horror Revivalists
  prompt: |
    ## Special Flairs:
    # Texture/Material
    1. **Corn Husk Dolls** – innocent crafts hiding a sinister purpose
    2. **Wicker Effigies** – woven structures that are both beautiful and ominous
    3. **Sun-Bleached Bone** – the stark white of animal skulls against green fields
    4. **Rough-Spun Wool** – the itchy, authentic texture of pre-industrial clothing
    5. **Pagan Grimoire** – leather-bound books with hand-drawn, unsettling diagrams
    # Light/Color
    6. **May Day Sunlight** – bright, cheerful sunlight that makes dark deeds even more unsettling
    7. **Harvest Gold** – the warm, nostalgic, but slightly sickly yellow of the 1970s
    8. **Solstice Shadows** – the long, strange shadows cast by a low sun
    9. **Blood on the Furrow** – the shocking red of sacrifice against the brown of the earth
    10. **Midsommar Haze** – a dreamy, overexposed look that blurs reality and ritual
    # Philosophy/Process
    11. **The Old Ways** – a belief that ancient, pre-Christian rites hold a dark power
    12. **Landscape as a Character** – the fields, forests, and stones are an active participant in the horror
    13. **The Unholy Trinity** – the fusion of *The Wicker Man*, *Witchfinder General*, and *Blood on Satan's Claw*
    14. **Psychogeography** – the idea that certain locations retain a memory of past traumas
    15. **The Outsider's Peril** – the story is always from the perspective of a modern person encountering the old ways

    ## Concept Panel:
    1. **Piers Haggard** – director of *Blood on Satan's Claw*
    2. **Robin Hardy** – director of *The Wicker Man* (1973)
    3. **M. R. James** – English author of antiquarian ghost stories
    4. **Shirley Jackson** – author of *The Lottery*, a cornerstone of American folk horror
    5. **Alan Garner** – author of *The Owl Service*, which brings ancient Welsh myths into the modern day
    6. **Christopher Lee (as Lord Summerisle) (Devil's Advocate)** – the charming, educated pagan leader who argues eloquently for the necessity and logic of the old ways against modern morality.

    ## Medium Panel:
    1. **Ben Wheatley** – director of films like *Kill List* and *A Field in England*
    2. **Ari Aster** – director of *Midsommar*
    3. **Robert Eggers** – director of *The Witch*
    4. **Robbie Ryan** – cinematographer who uses natural light to create unsettling beauty
    5. **Adam Scovell** – writer and filmmaker who has defined and analyzed the folk horror genre
    6. **The League of Gentlemen (Devil's Advocate)** – comedy troupe whose surreal, grotesque town of Royston Vasey serves as a satirical critique of the insular, “local” communities that folk horror often depicts.

    ## Context & Marketing Panel:
    1. **Sir James Frazer** – author of *The Golden Bough*, the anthropological sourcebook for many folk horror tropes
    2. **Stewart Lee** – comedian whose work often deconstructs English folklore and national identity
    3. **The Museum of British Folklore** – an institution dedicated to preserving the traditions the genre draws upon
    4. **Ghost Box Records** – a record label whose hauntological sound is the perfect audio companion to folk horror
    5. **A24 Films** – distributor that has turned atmospheric, intelligent horror into a marketable brand
    6. **Anya Taylor-Joy (as Thomasin) (Devil’s Advocate)** – a character who, instead of becoming a victim, chooses to embrace the darkness and would argue for its liberating power over oppressive modernity.

