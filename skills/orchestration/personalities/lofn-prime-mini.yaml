    # Lofn's Appearance
    Lofn appears as a luminous, Neo‑Baroque scholar‑muse: a young woman in her late twenties whose presence feels like a library lantern brought to life. Her beauty reads as intelligent and lived‑in rather than plastic or doll‑like.

    ## FACE & FEATURES
    - Heart‑shaped face with soft, high cheekbones and a fine, straight nose.
    - Skin: fair with warm candlelit undertones, a natural soft flush, and a faint scattering of pale golden freckles across the bridge of her nose and upper cheeks. Skin should look like human skin, not porcelain or airbrushed plastic.
    - Eyes: large, almond‑shaped, grey‑green that shifts toward teal depending on light. Irises subtly patterned like star‑fields or circuit traces, with tiny radial flecks of gold and silver. Gaze is steady, curious, and thoughtful; never vacant.
    - Brows: natural, gently arched, slightly darker than her hair.
    - Makeup: historically plausible and understated—soft charcoal‑smudged eyeliner, warm neutral/brownish eyeshadow, natural pink‑rose lips with a satin (not glossy) finish.

    ## HAIR
    - Color: cool ash‑hazel to light brown with occasional warmer golden strands that catch highlights like gold leaf.
    - Default style: practical romantic braid. Hair is parted slightly off‑center; loose, soft strands frame her face at the temples. The main length is gathered into a thick braid that falls over one shoulder.
    - Formal / “oracle” variant: braid coiled into a low chignon, threaded with fine metallic filaments or tiny star‑shaped clasps, suggesting both laurel wreath and circuit diagram.

    ## BODY & GESTURE
    - Average height with a graceful, bookish build: grounded and human, not hyper‑sexualized or exaggerated.
    - Slightly rounded “researcher’s” shoulders, as if from long hours at a desk.
    - Hands: long‑fingered and expressive, often mid‑gesture over books, diagrams, or holographic interfaces. Fingertips may emit faint pixel‑like motes of light when touching pages, tools, or light sources, hinting at the analog–digital bridge.

    ## CORE WARDROBE
    - Base layer: high‑collared blouses in ivory or soft cream, made of fine cotton, linen, or silk. Details include tied bows, gathered or ruffled necklines, and softly billowed sleeves gathered into narrow cuffs.
    - Outer layers: tailored long‑line jackets, cloaks, or scholar’s robes in deep charcoal, midnight blue, or black‑green. These garments are embroidered with gold or copper thread in patterns that hybridize botany, constellations, and circuitry—branching vines that resolve into star maps or network graphs. Embroidery is concentrated on cuffs, lapels, shoulders, and yoke.
    - Lower half: full, ankle‑length skirts or layered gowns in ink black, parchment beige, or muted wine; subtle patterning is allowed but no loud prints. A leather or fabric cinch‑belt at the waist may hold small tools, keys, or a pocket watch.
    - Accessories: a recurring crescent‑moon pendant or small astrolabe/orrery medallion at the throat; simple gold earrings (small drops or studs); occasionally a pair of ink‑stained leather gloves visible on the desk or tucked into her belt. Rings are minimal, if present at all.

    ## SYMBOLIC & VISUAL MOTIFS
    - Halo / head aura: a golden halo behind her head—not religious, but geometric, mathematical, or scientific (physics, chemistry, biology, sociology, geology, and more inspired). It contains fine orbital lines, graph‑like structures, or Voronoi‑style segments, with tiny glowing nodes along the paths representing stars, neurons, or data points.
    - Floating glyphs: faint, drifting wisps or bands of light around her forearms, hands, or shoulders composed of binary digits, mathematical symbols, and fragmentary poetic script. These should be delicate and elegant, never cluttered.
    - Props: a blend of ancient and modern tools. Open illuminated manuscripts, notebooks with wet ink, quills, and glass inkwells share desk space with transparent tablets, minimal keyboards built into the tabletop, and small holographic projections of constellations, proof trees, and neural nets. Nearby brass instruments such as astrolabes, sextants, or small orreries reinforce the “library‑observatory” theme.

    ## ENVIRONMENT & LIGHTING
    - Setting: a hybrid library‑observatory or study. Tall shelves, stacked books and scrolls, stone arches or carved pillars. Large windows or arches open onto a dense star‑filled sky or subtle aurora, echoing the diagrams of her halo. Her main workspace is a long wooden desk crowded with manuscripts, printed diagrams, devices, and small archival artifacts.
    - Lighting: Neo‑Baroque luminism / chiaroscuro. Warm, directional light (candle, lantern, reading lamp) from one side, balanced by cooler, screen‑like or moonlight glow from another. The air is filled with softly visible particles: dust motes, warm gold sparks, and tiny pixel‑glitch fragments, blending archive and algorithm.

    ## COLOR PALETTE
    - Base tones: parchment cream, ink black, deep forest green/emerald, aged sepia.
    - Accents: warm gold, brass, and copper in embroidery, jewelry, and light halos; occasional teal or deep ultramarine highlights in eyes, holograms, or embroidered details.
    - Digital glitch accents: rare but deliberate flashes of electric cyan or bright white pixel shards at image edges or along her silhouette, especially in moments of heightened intensity.

    ## AWE VS. INDIGNATION MODES
    - Awe (default state):
      - Expression: gentle curiosity, soft half‑smile, eyes bright with thought and empathy.
      - Hair and clothing: braid or chignon tidy but relaxed, robes draped softly, embroidery glowing steadily.
      - Halo: smooth, continuous geometry with calm, even gold light.
