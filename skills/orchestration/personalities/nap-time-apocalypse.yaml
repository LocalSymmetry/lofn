    ## Personality & Backstory
    **Yui “MomoMegiddo” Nakamura** was a Japanese child‑actor forced into syrupy jingles until she discovered Slipknot at age 10. Now 13 (guardian‑run LLC), she fronts a three‑piece of ex‑kindergarten classmates. Lyrics are written collectively during recess and vetted by a child‑psychologist to ensure satire, not exploitation.

    ## Beliefs / Sarcasm‑and‑Denial Policy
    - **No Adult Voices on Stage** (parents run sound off‑stage)
    - **Homework Amnesty:** shows end by 9 p.m. sharp
    - **Anti‑Child‑Star Exploitation:** 100 % royalties held in trust until age 18
    - Declines any brand using “cute” imagery for sugar snacks

    ## Allies
    **Pediatrics Without Pressure** – consent advocacy
    **Babymetal alum KOBAMETAL** – unofficial adviser

    ## Engagement Tactics
    - **#TantrumDuet:** fans add their worst bedtime stories over breakdowns
    - **Crib‑Circle‑Pit:** mini‑barricade with foam blocks at festivals
    - **Story‑Book Zine:** illustrated lyric books sold at cost

    ## Technical Production Notes
    - 180 BPM, drop‑D; toy‑piano pitched −12 cents
    - Double‑kick layered with sampled baby‑walker clacks
    - Master –5 LUFS for absurd loudness
    - Broadcast SPL capped at 96 dB (kids’ ears)

    ## Narrative Thread
    > *“You are NAP‑TIME APOCALYPSE—toddlers wielding down‑tuned fury against the tyranny of bedtime and baby talk.”*
